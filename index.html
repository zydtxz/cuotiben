        // ============================================
        // Canvas 核心优化 - 荣耀Magic平板专用
        // ============================================
        function initCanvas(containerId, savedImage, type, bgImageData) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const canvas = document.getElementById('canvas_' + containerId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d', { 
                alpha: true,
                desynchronized: true
            });
            
            const errId = containerId.replace(/^(wrong_|analysis_|correct_)/, '');
            
            // 获取DPR - 荣耀Magic高分辨率屏幕
            const dpr = Math.min(window.devicePixelRatio || 1, 3); // 限制最大3倍DPR避免性能问题
            
            // 获取实际显示尺寸
            const rect = container.querySelector('canvas').getBoundingClientRect();
            const displayWidth = rect.width || container.offsetWidth;
            // 动态计算高度：撑满到屏幕底部
            const isWrongArea = containerId.startsWith('wrong_');
            const canvasRect = canvas.getBoundingClientRect();
            const availableHeight = window.innerHeight - canvasRect.top - 40; // 留40px底部边距
            const displayHeight = Math.max(availableHeight, 350); // 最小350px
            
            // 设置Canvas实际像素 - 高DPI处理
            canvas.width = Math.floor(displayWidth * dpr);
            canvas.height = Math.floor(displayHeight * dpr);
            
            // 设置CSS显示尺寸
            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
            
            // 缩放上下文以匹配DPR
            ctx.scale(dpr, dpr);
            
            // 白色背景
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, displayWidth, displayHeight);
            
            // 背景图片（题目照片）
            let bgImage = null;
            if (bgImageData) {
                bgImage = new Image();
                bgImage.onload = function() {
                    // 重绘白底 + 背景图
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, displayWidth, displayHeight);
                    // 保持宽高比居中绘制
                    const scale = Math.min(displayWidth / bgImage.width, displayHeight / bgImage.height);
                    const w = bgImage.width * scale;
                    const h = bgImage.height * scale;
                    const x = (displayWidth - w) / 2;
                    const y = (displayHeight - h) / 2;
                    ctx.drawImage(bgImage, x, y, w, h);
                    // 如果有保存的笔画叠加
                    if (savedImage) {
                        const savedImg = new Image();
                        savedImg.onload = function() {
                            ctx.drawImage(savedImg, 0, 0, displayWidth, displayHeight);
                            syncToOffscreen();
                        };
                        savedImg.src = savedImage;
                    } else {
                        syncToOffscreen();
                    }
                };
                bgImage.src = bgImageData;
            } else if (savedImage) {
                const img = new Image();
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, displayWidth, displayHeight);
                };
                img.src = savedImage;
            }

            // ========== 手写状态 ==========
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            let strokeColor = '#1a1a1a';
            let strokeWidth = 2;
            let isEraser = false;
            
            // 性能优化：使用离屏canvas存储
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = canvas.width;
            offscreenCanvas.height = canvas.height;
            const offCtx = offscreenCanvas.getContext('2d', { alpha: false });
            
            // 复制当前内容到离屏canvas
            function syncToOffscreen() {
                offCtx.drawImage(canvas, 0, 0);
            }
            
            // 从离屏canvas恢复
            function restoreFromOffscreen() {
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.drawImage(offscreenCanvas, 0, 0);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            // ========== 获取坐标 - 适配各种输入 ==========
            function getPointerPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            // ========== 绘制函数 ==========
            function drawLine(x1, y1, x2, y2) {
                ctx.save();
                
                // 从canvasState获取最新的宽度和颜色
                const currentWidth = container.canvasState.strokeWidth;
                const currentColor = container.canvasState.strokeColor;
                const currentEraser = container.canvasState.isEraser;
                
                if (currentEraser) {
                    // 橡皮模式：用白色覆盖擦除
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = currentWidth * 4;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                    ctx.lineWidth = currentWidth;
                }
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                ctx.restore();
            }

            // ========== 图形绘制函数 ==========
            function drawShape(startX, startY, endX, endY, shapeType, isPreview) {
                const currentWidth = container.canvasState.strokeWidth;
                const currentColor = container.canvasState.strokeColor;
                const lineStyle = container.canvasState.lineStyle;
                
                ctx.save();
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // 虚线模式
                if (lineStyle === 'dash') {
                    ctx.setLineDash([10, 5]);
                }
                
                ctx.beginPath();
                
                switch(shapeType) {
                    case 'line':
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        break;
                    case 'triangle':
                        // 普通三角形：起点是底边中点，终点是顶点
                        const baseWidth = Math.abs(endX - startX) * 2;
                        ctx.moveTo(startX - baseWidth/2, startY);
                        ctx.lineTo(startX + baseWidth/2, startY);
                        ctx.lineTo(endX, endY);
                        ctx.closePath();
                        break;
                    case 'equilateral_triangle':
                        // 等边三角形：起点是底边中点，自动计算高度
                        const eqSide = Math.abs(endX - startX) * 2;
                        const eqHeight = eqSide * Math.sqrt(3) / 2;
                        ctx.moveTo(startX - eqSide/2, startY);
                        ctx.lineTo(startX + eqSide/2, startY);
                        ctx.lineTo(startX, startY - eqHeight);
                        ctx.closePath();
                        break;
                    case 'isosceles_triangle':
                        // 等腰三角形：起点是底边中点，终点是顶点（保持对称）
                        const isoBase = Math.abs(endX - startX) * 2;
                        const isoHeight = Math.abs(endY - startY);
                        ctx.moveTo(startX - isoBase/2, startY);
                        ctx.lineTo(startX + isoBase/2, startY);
                        ctx.lineTo(startX, startY - isoHeight);
                        ctx.closePath();
                        break;
                    case 'right_triangle':
                        // 直角三角形：起点是直角顶点，终点确定两直角边
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, startY);
                        ctx.lineTo(startX, endY);
                        ctx.closePath();
                        break;
                    case 'rect':
                        const w = endX - startX;
                        const h = endY - startY;
                        ctx.rect(startX, startY, w, h);
                        break;
                    case 'square':
                        // 正方形：以起点为左上角，边长由拖动距离决定
                        const sqSize = Math.min(Math.abs(endX - startX), Math.abs(endY - startY));
                        ctx.rect(startX, startY, sqSize, sqSize);
                        break;
                    case 'parallelogram':
                        // 平行四边形：起点是左下角，终点是右上角，倾斜角度由水平距离决定
                        const pw = endX - startX;
                        const ph = endY - startY;
                        const offset = pw * 0.3; // 倾斜偏移
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(startX + pw, startY);
                        ctx.lineTo(startX + pw - offset, startY + ph);
                        ctx.lineTo(startX - offset, startY + ph);
                        ctx.closePath();
                        break;
                    case 'ellipse':
                        // 椭圆：起点是中心，终点是边缘
                        const rx = Math.abs(endX - startX);
                        const ry = Math.abs(endY - startY);
                        ctx.ellipse(startX, startY, rx, ry, 0, 0, Math.PI * 2);
                        break;
                    case 'circle':
                        const radius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                        ctx.arc(startX, startY, radius, 0, Math.PI * 2);
                        break;
                    case 'arrow':
                        // 画箭头线
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();
                        
                        // 画箭头头部
                        const angle = Math.atan2(endY - startY, endX - startX);
                        const headLen = 15;
                        ctx.beginPath();
                        ctx.moveTo(endX, endY);
                        ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI / 6), endY - headLen * Math.sin(angle - Math.PI / 6));
                        ctx.moveTo(endX, endY);
                        ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI / 6), endY - headLen * Math.sin(angle + Math.PI / 6));
                        break;
                    
                    // ========== 立体图形 ==========
                    case 'cube':
                        // 正方体：起点是前面左下角，终点是后面右上角
                        const cubeSize = Math.min(Math.abs(endX - startX), Math.abs(endY - startY));
                        const cubeOffset = cubeSize * 0.3; // 3D透视偏移
                        drawCube(ctx, startX, startY, cubeSize, cubeSize, cubeOffset);
                        break;
                    case 'cuboid':
                        // 长方体：起点是前面左下角，终点是后面右上角
                        const cbWidth = Math.abs(endX - startX);
                        const cbHeight = Math.abs(endY - startY);
                        const cbOffset = Math.min(cbWidth, cbHeight) * 0.3;
                        drawCuboid(ctx, startX, startY, cbWidth, cbHeight, cbOffset);
                        break;
                    case 'cylinder':
                        // 圆柱：起点是底面中心，终点是顶面边缘
                        const cylWidth = Math.abs(endX - startX);
                        const cylHeight = Math.abs(endY - startY);
                        drawCylinder(ctx, startX, startY, cylWidth, cylHeight);
                        break;
                    case 'cone':
                        // 圆锥：起点是底面中心，终点是顶点
                        const coneWidth = Math.abs(endX - startX);
                        const coneHeight = Math.abs(endY - startY);
                        drawCone(ctx, startX, startY, coneWidth, coneHeight);
                        break;
                    case 'sphere':
                        // 球体：起点是中心，终点是边缘
                        const sphereRadius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                        drawSphere(ctx, startX, startY, sphereRadius);
                        break;
                    
                    // ========== 数学工具 ==========
                    case 'coordinate':
                        drawCoordinate(ctx, startX, startY, endX, endY, false);
                        break;
                    case 'coordinate_grid':
                        drawCoordinate(ctx, startX, startY, endX, endY, true);
                        break;
                    case 'number_line':
                        drawNumberLine(ctx, startX, startY, endX);
                        break;
                    case 'unit_circle':
                        drawUnitCircle(ctx, startX, startY, Math.abs(endX - startX));
                        break;
                    case 'angle':
                        drawAngle(ctx, startX, startY, endX, endY);
                        break;
                    case 'venn':
                        drawVenn(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    
                    // ========== 物理工具 ==========
                    case 'force_arrow':
                        drawForceArrow(ctx, startX, startY, endX, endY);
                        break;
                    case 'inclined_plane':
                        drawInclinedPlane(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'pulley':
                        drawPulley(ctx, startX, startY, Math.abs(endX - startX));
                        break;
                    case 'spring':
                        drawSpring(ctx, startX, startY, endX, endY);
                        break;
                    case 'convex_lens':
                        drawConvexLens(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'concave_lens':
                        drawConcaveLens(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'mirror':
                        drawMirror(ctx, startX, startY, Math.abs(endX - startX));
                        break;
                    case 'resistor':
                        drawResistor(ctx, startX, startY, Math.abs(endX - startX));
                        break;
                    case 'battery':
                        drawBattery(ctx, startX, startY, Math.abs(endX - startX));
                        break;
                    case 'magnet':
                        drawMagnet(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    
                    // ========== 地理工具 ==========
                    case 'earth':
                        drawEarth(ctx, startX, startY, Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2)));
                        break;
                    case 'contour':
                        drawContour(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'profile':
                        drawProfile(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'wind':
                        drawWind(ctx, startX, startY, endX, endY);
                        break;
                    
                    // ========== 生物工具 ==========
                    case 'plant_cell':
                        drawPlantCell(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'animal_cell':
                        drawAnimalCell(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'dna':
                        drawDNA(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                    case 'microscope':
                        drawMicroscope(ctx, startX, startY, Math.abs(endX - startX), Math.abs(endY - startY));
                        break;
                }
                
                ctx.stroke();
                ctx.restore();
            }
            
            // ========== 立体图形绘制辅助函数 ==========
            function drawCube(ctx, x, y, width, height, offset) {
                // 前面
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + width, y);
                ctx.lineTo(x + width, y + height);
                ctx.lineTo(x, y + height);
                ctx.closePath();
                ctx.stroke();
                
                // 后面
                ctx.beginPath();
                ctx.moveTo(x + offset, y - offset);
                ctx.lineTo(x + width + offset, y - offset);
                ctx.lineTo(x + width + offset, y + height - offset);
                ctx.lineTo(x + offset, y + height - offset);
                ctx.closePath();
                ctx.stroke();
                
                // 连接线
                ctx.beginPath();
                ctx.moveTo(x, y); ctx.lineTo(x + offset, y - offset);
                ctx.moveTo(x + width, y); ctx.lineTo(x + width + offset, y - offset);
                ctx.moveTo(x + width, y + height); ctx.lineTo(x + width + offset, y + height - offset);
                ctx.moveTo(x, y + height); ctx.lineTo(x + offset, y + height - offset);
                ctx.stroke();
            }
            
            function drawCuboid(ctx, x, y, width, height, offset) {
                // 前面
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + width, y);
                ctx.lineTo(x + width, y + height);
                ctx.lineTo(x, y + height);
                ctx.closePath();
                ctx.stroke();
                
                // 后面
                ctx.beginPath();
                ctx.moveTo(x + offset, y - offset);
                ctx.lineTo(x + width + offset, y - offset);
                ctx.lineTo(x + width + offset, y + height - offset);
                ctx.lineTo(x + offset, y + height - offset);
                ctx.closePath();
                ctx.stroke();
                
                // 连接线
                ctx.beginPath();
                ctx.moveTo(x, y); ctx.lineTo(x + offset, y - offset);
                ctx.moveTo(x + width, y); ctx.lineTo(x + width + offset, y - offset);
                ctx.moveTo(x + width, y + height); ctx.lineTo(x + width + offset, y + height - offset);
                ctx.moveTo(x, y + height); ctx.lineTo(x + offset, y + height - offset);
                ctx.stroke();
            }
            
            function drawCylinder(ctx, cx, cy, radiusX, height) {
                const radiusY = radiusX * 0.3; // 椭圆扁率
                
                // 底面椭圆
                ctx.beginPath();
                ctx.ellipse(cx, cy + height, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 顶面椭圆
                ctx.beginPath();
                ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 侧面线
                ctx.beginPath();
                ctx.moveTo(cx - radiusX, cy);
                ctx.lineTo(cx - radiusX, cy + height);
                ctx.moveTo(cx + radiusX, cy);
                ctx.lineTo(cx + radiusX, cy + height);
                ctx.stroke();
            }
            
            function drawCone(ctx, cx, cy, radiusX, height) {
                const radiusY = radiusX * 0.3;
                
                // 底面椭圆
                ctx.beginPath();
                ctx.ellipse(cx, cy + height, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 侧面线到顶点
                ctx.beginPath();
                ctx.moveTo(cx - radiusX, cy + height);
                ctx.lineTo(cx, cy);
                ctx.moveTo(cx + radiusX, cy + height);
                ctx.lineTo(cx, cy);
                ctx.stroke();
            }
            
            function drawSphere(ctx, cx, cy, radius) {
                // 主圆
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 赤道椭圆（横线）
                ctx.beginPath();
                ctx.ellipse(cx, cy, radius, radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 经线椭圆（竖线）
                ctx.beginPath();
                ctx.ellipse(cx, cy, radius * 0.3, radius, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // ========== 数学工具绘图函数 ==========
            function drawCoordinate(ctx, x, y, w, h, withGrid) {
                const originX = x;
                const originY = y + h;
                const endXCoord = x + w;
                const endYCoord = y;
                
                // 网格
                if (withGrid) {
                    ctx.save();
                    ctx.strokeStyle = '#ddd';
                    ctx.lineWidth = 0.5;
                    ctx.setLineDash([]);
                    const gridSize = 20;
                    for (let gx = originX; gx <= endXCoord; gx += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(gx, originY);
                        ctx.lineTo(gx, endYCoord);
                        ctx.stroke();
                    }
                    for (let gy = originY; gy >= endYCoord; gy -= gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(originX, gy);
                        ctx.lineTo(endXCoord, gy);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
                
                // X轴
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(endXCoord + 10, originY);
                ctx.stroke();
                // X轴箭头
                ctx.beginPath();
                ctx.moveTo(endXCoord + 10, originY);
                ctx.lineTo(endXCoord + 2, originY - 5);
                ctx.moveTo(endXCoord + 10, originY);
                ctx.lineTo(endXCoord + 2, originY + 5);
                ctx.stroke();
                
                // Y轴
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(originX, endYCoord - 10);
                ctx.stroke();
                // Y轴箭头
                ctx.beginPath();
                ctx.moveTo(originX, endYCoord - 10);
                ctx.lineTo(originX - 5, endYCoord - 2);
                ctx.moveTo(originX, endYCoord - 10);
                ctx.lineTo(originX + 5, endYCoord - 2);
                ctx.stroke();
                
                // 标注
                ctx.save();
                ctx.font = '14px Arial';
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fillText('x', endXCoord + 12, originY + 5);
                ctx.fillText('y', originX - 15, endYCoord - 5);
                ctx.fillText('O', originX - 15, originY + 15);
                ctx.restore();
            }
            
            function drawNumberLine(ctx, x, y, endXPos) {
                // 数轴线
                ctx.beginPath();
                ctx.moveTo(x - 20, y);
                ctx.lineTo(endXPos + 20, y);
                ctx.stroke();
                
                // 箭头
                ctx.beginPath();
                ctx.moveTo(endXPos + 20, y);
                ctx.lineTo(endXPos + 12, y - 5);
                ctx.moveTo(endXPos + 20, y);
                ctx.lineTo(endXPos + 12, y + 5);
                ctx.stroke();
                
                // 刻度
                const tickSpacing = 30;
                const tickCount = Math.floor((endXPos - x) / tickSpacing);
                for (let i = 0; i <= tickCount; i++) {
                    const tx = x + i * tickSpacing;
                    ctx.beginPath();
                    ctx.moveTo(tx, y - 5);
                    ctx.lineTo(tx, y + 5);
                    ctx.stroke();
                }
            }
            
            function drawUnitCircle(ctx, cx, cy, radius) {
                // 坐标轴
                ctx.beginPath();
                ctx.moveTo(cx - radius - 20, cy);
                ctx.lineTo(cx + radius + 20, cy);
                ctx.moveTo(cx, cy - radius - 20);
                ctx.lineTo(cx, cy + radius + 20);
                ctx.stroke();
                
                // 单位圆
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 标注
                ctx.save();
                ctx.font = '12px Arial';
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fillText('1', cx + radius + 5, cy + 15);
                ctx.fillText('-1', cx - radius - 20, cy + 15);
                ctx.fillText('1', cx + 5, cy - radius - 5);
                ctx.fillText('-1', cx + 5, cy + radius + 15);
                ctx.restore();
            }
            
            function drawAngle(ctx, x, y, endXPos, endYPos) {
                const radius = Math.sqrt(Math.pow(endXPos - x, 2) + Math.pow(endYPos - y, 2));
                
                // 两条边
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + radius, y);
                ctx.moveTo(x, y);
                ctx.lineTo(endXPos, endYPos);
                ctx.stroke();
                
                // 角度弧
                const angle = Math.atan2(endYPos - y, endXPos - x);
                ctx.beginPath();
                ctx.arc(x, y, radius * 0.3, 0, angle, angle < 0);
                ctx.stroke();
            }
            
            function drawVenn(ctx, x, y, w, h) {
                const radius = Math.min(w, h) / 2;
                const offset = radius * 0.5;
                
                // 左圆
                ctx.beginPath();
                ctx.arc(x + w/2 - offset, y + h/2, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 右圆
                ctx.beginPath();
                ctx.arc(x + w/2 + offset, y + h/2, radius, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // ========== 物理工具绘图函数 ==========
            function drawForceArrow(ctx, x, y, endXPos, endYPos) {
                // 力的箭头线
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endXPos, endYPos);
                ctx.stroke();
                
                // 箭头头部（更大）
                const angle = Math.atan2(endYPos - y, endXPos - x);
                const headLen = 20;
                ctx.beginPath();
                ctx.moveTo(endXPos, endYPos);
                ctx.lineTo(endXPos - headLen * Math.cos(angle - Math.PI / 6), endYPos - headLen * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(endXPos, endYPos);
                ctx.lineTo(endXPos - headLen * Math.cos(angle + Math.PI / 6), endYPos - headLen * Math.sin(angle + Math.PI / 6));
                ctx.stroke();
                
                // 起点圆点
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            function drawInclinedPlane(ctx, x, y, w, h) {
                // 斜面
                ctx.beginPath();
                ctx.moveTo(x, y + h);
                ctx.lineTo(x + w, y + h);
                ctx.lineTo(x + w, y);
                ctx.closePath();
                ctx.stroke();
                
                // 物体（方块）
                const blockW = 30;
                const blockH = 20;
                const blockX = x + w * 0.4;
                const blockY = y + h - (w * 0.4) * (h / w) - blockH;
                ctx.beginPath();
                ctx.rect(blockX, blockY, blockW, blockH);
                ctx.stroke();
            }
            
            function drawPulley(ctx, cx, cy, radius) {
                // 滑轮圆
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 中心轴
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.15, 0, Math.PI * 2);
                ctx.stroke();
                
                // 支架
                ctx.beginPath();
                ctx.moveTo(cx, cy - radius);
                ctx.lineTo(cx, cy - radius - 20);
                ctx.moveTo(cx - 15, cy - radius - 20);
                ctx.lineTo(cx + 15, cy - radius - 20);
                ctx.stroke();
                
                // 绳子
                ctx.beginPath();
                ctx.moveTo(cx - radius, cy);
                ctx.lineTo(cx - radius, cy + 40);
                ctx.moveTo(cx + radius, cy);
                ctx.lineTo(cx + radius, cy + 40);
                ctx.stroke();
            }
            
            function drawSpring(ctx, x, y, endXPos, endYPos) {
                const length = Math.sqrt(Math.pow(endXPos - x, 2) + Math.pow(endYPos - y, 2));
                const angle = Math.atan2(endYPos - y, endXPos - x);
                const coils = 8;
                const amplitude = 10;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                for (let i = 0; i < coils; i++) {
                    const segLen = length / coils;
                    ctx.lineTo(i * segLen + segLen * 0.25, -amplitude);
                    ctx.lineTo(i * segLen + segLen * 0.75, amplitude);
                    ctx.lineTo((i + 1) * segLen, 0);
                }
                ctx.stroke();
                
                ctx.restore();
            }
            
            function drawConvexLens(ctx, cx, cy, w, h) {
                // 凸透镜
                ctx.beginPath();
                ctx.ellipse(cx - w * 0.1, cy, w * 0.15, h / 2, 0, -Math.PI / 2, Math.PI / 2);
                ctx.ellipse(cx + w * 0.1, cy, w * 0.15, h / 2, 0, Math.PI / 2, -Math.PI / 2);
                ctx.stroke();
                
                // 主光轴
                ctx.beginPath();
                ctx.moveTo(cx - w / 2 - 20, cy);
                ctx.lineTo(cx + w / 2 + 20, cy);
                ctx.stroke();
            }
            
            function drawConcaveLens(ctx, cx, cy, w, h) {
                // 凹透镜
                ctx.beginPath();
                ctx.ellipse(cx - w * 0.15, cy, w * 0.1, h / 2, 0, -Math.PI / 2, Math.PI / 2, true);
                ctx.ellipse(cx + w * 0.15, cy, w * 0.1, h / 2, 0, Math.PI / 2, -Math.PI / 2, true);
                ctx.stroke();
                
                // 主光轴
                ctx.beginPath();
                ctx.moveTo(cx - w / 2 - 20, cy);
                ctx.lineTo(cx + w / 2 + 20, cy);
                ctx.stroke();
            }
            
            function drawMirror(ctx, cx, cy, w) {
                // 镜面
                ctx.beginPath();
                ctx.moveTo(cx, cy - w / 2);
                ctx.lineTo(cx, cy + w / 2);
                ctx.stroke();
                
                // 背面斜线
                const hatchCount = 8;
                const hatchLen = 8;
                for (let i = 0; i < hatchCount; i++) {
                    const hy = cy - w / 2 + (w / hatchCount) * i;
                    ctx.beginPath();
                    ctx.moveTo(cx, hy);
                    ctx.lineTo(cx + hatchLen, hy + hatchLen);
                    ctx.stroke();
                }
            }
            
            function drawResistor(ctx, x, y, w) {
                // 电阻符号（锯齿形）
                const segments = 6;
                const segW = w / segments;
                const amp = 10;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                for (let i = 0; i < segments; i++) {
                    ctx.lineTo(x + i * segW + segW * 0.5, y - amp);
                    ctx.lineTo(x + (i + 1) * segW, y + amp);
                }
                ctx.stroke();
                
                // 引线
                ctx.beginPath();
                ctx.moveTo(x - 15, y);
                ctx.lineTo(x, y);
                ctx.moveTo(x + w, y);
                ctx.lineTo(x + w + 15, y);
                ctx.stroke();
            }
            
            function drawBattery(ctx, x, y, w) {
                // 长线（正极）
                ctx.beginPath();
                ctx.moveTo(x + w * 0.3, y - 15);
                ctx.lineTo(x + w * 0.3, y + 15);
                ctx.stroke();
                
                // 短线（负极）
                ctx.beginPath();
                ctx.moveTo(x + w * 0.7, y - 8);
                ctx.lineTo(x + w * 0.7, y + 8);
                ctx.stroke();
                
                // 引线
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + w * 0.3, y);
                ctx.moveTo(x + w * 0.7, y);
                ctx.lineTo(x + w, y);
                ctx.stroke();
                
                // 标注
                ctx.save();
                ctx.font = '12px Arial';
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fillText('+', x + w * 0.3 - 5, y - 20);
                ctx.fillText('-', x + w * 0.7 - 3, y - 12);
                ctx.restore();
            }
            
            function drawMagnet(ctx, x, y, w, h) {
                // U形磁铁
                const r = Math.min(w, h) / 2;
                
                // 左边（N极）
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.stroke();
                
                // 右边（S极）
                ctx.beginPath();
                ctx.moveTo(x + w, y);
                ctx.lineTo(x + w, y + h);
                ctx.lineTo(x + w - r, y + h);
                ctx.stroke();
                
                // 底部弧线
                ctx.beginPath();
                ctx.arc(x + w / 2, y + h, (w - 2 * r) / 2, 0, Math.PI);
                ctx.stroke();
                
                // 标注
                ctx.save();
                ctx.font = 'bold 14px Arial';
                ctx.fillStyle = '#E74C3C';
                ctx.fillText('N', x - 5, y - 5);
                ctx.fillStyle = '#3498DB';
                ctx.fillText('S', x + w - 5, y - 5);
                ctx.restore();
            }
            
            // ========== 地理工具绘图函数 ==========
            function drawEarth(ctx, cx, cy, radius) {
                // 地球圆
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 纬线
                ctx.beginPath();
                ctx.ellipse(cx, cy, radius, radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.ellipse(cx, cy - radius * 0.4, radius * 0.8, radius * 0.2, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.ellipse(cx, cy + radius * 0.4, radius * 0.8, radius * 0.2, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 经线
                ctx.beginPath();
                ctx.ellipse(cx, cy, radius * 0.3, radius, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            function drawContour(ctx, cx, cy, w, h) {
                // 等高线（多个同心椭圆）
                const layers = 4;
                for (let i = 0; i < layers; i++) {
                    const rx = w * (1 - i * 0.2) / 2;
                    const ry = h * (1 - i * 0.2) / 2;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            
            function drawProfile(ctx, x, y, w, h) {
                // 地形剖面图
                ctx.beginPath();
                ctx.moveTo(x, y + h);
                ctx.lineTo(x, y + h * 0.7);
                ctx.quadraticCurveTo(x + w * 0.2, y + h * 0.3, x + w * 0.4, y + h * 0.5);
                ctx.quadraticCurveTo(x + w * 0.6, y + h * 0.7, x + w * 0.8, y + h * 0.2);
                ctx.quadraticCurveTo(x + w * 0.9, y + h * 0.4, x + w, y + h * 0.6);
                ctx.lineTo(x + w, y + h);
                ctx.closePath();
                ctx.stroke();
                
                // 基准线
                ctx.beginPath();
                ctx.moveTo(x, y + h);
                ctx.lineTo(x + w, y + h);
                ctx.stroke();
            }
            
            function drawWind(ctx, x, y, endXPos, endYPos) {
                // 风向杆
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endXPos, endYPos);
                ctx.stroke();
                
                // 风向标（三角形）
                const angle = Math.atan2(endYPos - y, endXPos - x);
                const flagLen = 20;
                
                ctx.beginPath();
                ctx.moveTo(endXPos, endYPos);
                ctx.lineTo(endXPos - flagLen * Math.cos(angle - Math.PI / 4), endYPos - flagLen * Math.sin(angle - Math.PI / 4));
                ctx.lineTo(endXPos - flagLen * Math.cos(angle + Math.PI / 4), endYPos - flagLen * Math.sin(angle + Math.PI / 4));
                ctx.closePath();
                ctx.stroke();
            }
            
            // ========== 生物工具绘图函数 ==========
            function drawPlantCell(ctx, x, y, w, h) {
                // 细胞壁（矩形带圆角）
                ctx.beginPath();
                ctx.rect(x, y, w, h);
                ctx.stroke();
                
                // 细胞膜
                ctx.beginPath();
                ctx.rect(x + 5, y + 5, w - 10, h - 10);
                ctx.stroke();
                
                // 细胞核
                ctx.beginPath();
                ctx.ellipse(x + w * 0.5, y + h * 0.5, w * 0.15, h * 0.15, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 叶绿体（椭圆）
                ctx.beginPath();
                ctx.ellipse(x + w * 0.25, y + h * 0.3, 10, 6, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(x + w * 0.7, y + h * 0.7, 10, 6, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 液泡
                ctx.beginPath();
                ctx.ellipse(x + w * 0.5, y + h * 0.5, w * 0.25, h * 0.25, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            function drawAnimalCell(ctx, cx, cy, rx, ry) {
                // 细胞膜（不规则圆形）
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 细胞核
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx * 0.3, ry * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 线粒体
                ctx.beginPath();
                ctx.ellipse(cx + rx * 0.5, cy - ry * 0.3, 8, 5, 0.3, 0, Math.PI * 2);
                ctx.stroke();
                
                // 内质网
                ctx.beginPath();
                ctx.moveTo(cx - rx * 0.4, cy + ry * 0.3);
                ctx.quadraticCurveTo(cx - rx * 0.2, cy + ry * 0.5, cx, cy + ry * 0.3);
                ctx.stroke();
            }
            
            function drawDNA(ctx, x, y, w, h) {
                // DNA双螺旋
                const segments = 20;
                const segH = h / segments;
                const amplitude = w / 4;
                
                // 链1
                ctx.beginPath();
                for (let i = 0; i <= segments; i++) {
                    const py = y + i * segH;
                    const px = x + w / 2 + Math.sin(i * 0.6) * amplitude;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                
                // 链2
                ctx.beginPath();
                for (let i = 0; i <= segments; i++) {
                    const py = y + i * segH;
                    const px = x + w / 2 - Math.sin(i * 0.6) * amplitude;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                
                // 碱基对（横线）
                for (let i = 2; i < segments; i += 3) {
                    const py = y + i * segH;
                    const px1 = x + w / 2 + Math.sin(i * 0.6) * amplitude;
                    const px2 = x + w / 2 - Math.sin(i * 0.6) * amplitude;
                    ctx.beginPath();
                    ctx.moveTo(px1, py);
                    ctx.lineTo(px2, py);
                    ctx.stroke();
                }
            }
            
            function drawMicroscope(ctx, x, y, w, h) {
                // 显微镜简图
                // 底座
                ctx.beginPath();
                ctx.moveTo(x, y + h);
                ctx.lineTo(x + w, y + h);
                ctx.stroke();
                
                // 支架
                ctx.beginPath();
                ctx.moveTo(x + w * 0.3, y + h);
                ctx.lineTo(x + w * 0.3, y + h * 0.3);
                ctx.lineTo(x + w * 0.7, y + h * 0.3);
                ctx.lineTo(x + w * 0.7, y + h);
                ctx.stroke();
                
                // 镜筒
                ctx.beginPath();
                ctx.moveTo(x + w * 0.5, y + h * 0.3);
                ctx.lineTo(x + w * 0.5, y);
                ctx.stroke();
                
                // 目镜
                ctx.beginPath();
                ctx.rect(x + w * 0.4, y - 10, w * 0.2, 15);
                ctx.stroke();
                
                // 物镜
                ctx.beginPath();
                ctx.moveTo(x + w * 0.5, y + h * 0.3);
                ctx.lineTo(x + w * 0.45, y + h * 0.5);
                ctx.moveTo(x + w * 0.5, y + h * 0.3);
                ctx.lineTo(x + w * 0.55, y + h * 0.5);
                ctx.stroke();
                
                // 载物台
                ctx.beginPath();
                ctx.moveTo(x + w * 0.2, y + h * 0.6);
                ctx.lineTo(x + w * 0.8, y + h * 0.6);
                ctx.stroke();
            }

            // ========== 曲线绘制函数 ==========
            function drawCurve(points) {
                if (points.length < 2) return;
                
                const currentWidth = container.canvasState.strokeWidth;
                const currentColor = container.canvasState.strokeColor;
                
                ctx.save();
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                
                // 使用贝塞尔曲线平滑连接
                for (let i = 1; i < points.length - 1; i++) {
                    const xc = (points[i].x + points[i+1].x) / 2;
                    const yc = (points[i].y + points[i+1].y) / 2;
                    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                }
                
                // 连接最后一个点
                if (points.length > 1) {
                    const last = points[points.length - 1];
                    ctx.lineTo(last.x, last.y);
                }
                
                ctx.stroke();
                ctx.restore();
            }

            // ========== Pointer Events - 统一处理鼠标/触摸/手写笔 ==========
            // Pointer Events API 提供统一的输入处理
            canvas.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                canvas.setPointerCapture(e.pointerId);
                
                isDrawing = true;
                const pos = getPointerPos(e);
                lastX = pos.x;
                lastY = pos.y;
                
                // 记录指针位置供符号插入使用
                container.canvasState.lastPointerPos = { x: pos.x, y: pos.y };
                
                // 检查是否是图形模式
                const currentShape = container.canvasState.currentShape;
                
                if (currentShape === 'curve') {
                    // 曲线模式：开始收集点
                    container.canvasState.curvePoints = [{ x: pos.x, y: pos.y }];
                    container.canvasState.shapeStartPos = { x: pos.x, y: pos.y };
                    container.canvasState.shapePreviewData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                } else if (currentShape) {
                    // 其他图形模式：记录起点，保存背景（用于实时预览）
                    container.canvasState.shapeStartPos = { x: pos.x, y: pos.y };
                    container.canvasState.shapePreviewData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // 对于符号类工具，立即绘制一个默认大小的预览
                    const symbolTools = ['coordinate', 'coordinate_grid', 'number_line', 'unit_circle', 
                                        'angle', 'venn', 'force_arrow', 'inclined_plane', 'pulley', 
                                        'spring', 'convex_lens', 'concave_lens', 'mirror', 'resistor', 
                                        'battery', 'magnet', 'earth', 'contour', 'profile', 'wind',
                                        'plant_cell', 'animal_cell', 'dna', 'microscope',
                                        'cube', 'cuboid', 'cylinder', 'cone', 'sphere'];
                    
                    if (symbolTools.includes(currentShape)) {
                        // 绘制初始预览（默认大小）
                        const defaultSize = 80; // 默认大小
                        drawShape(pos.x, pos.y, pos.x + defaultSize, pos.y + defaultSize, currentShape, true);
                    }
                } else {
                    // 画笔模式：绘制起点
                    ctx.save();
                    if (container.canvasState.isEraser) {
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, container.canvasState.strokeWidth * 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = container.canvasState.strokeColor;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, container.canvasState.strokeWidth / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }, { passive: false });

            canvas.addEventListener('pointermove', function(e) {
                if (!isDrawing) return;
                e.preventDefault();
                
                const pos = getPointerPos(e);
                
                // 检查是否是图形模式
                const currentShape = container.canvasState.currentShape;
                
                if (currentShape === 'curve') {
                    // 曲线模式：收集点并实时绘制
                    container.canvasState.curvePoints.push({ x: pos.x, y: pos.y });
                    if (container.canvasState.shapePreviewData) {
                        ctx.putImageData(container.canvasState.shapePreviewData, 0, 0);
                    }
                    drawCurve(container.canvasState.curvePoints);
                } else if (currentShape && container.canvasState.shapeStartPos) {
                    // 图形模式：恢复背景，绘制预览图形
                    if (container.canvasState.shapePreviewData) {
                        ctx.putImageData(container.canvasState.shapePreviewData, 0, 0);
                    }
                    drawShape(
                        container.canvasState.shapeStartPos.x,
                        container.canvasState.shapeStartPos.y,
                        pos.x, pos.y,
                        currentShape,
                        true
                    );
                } else {
                    // 画笔模式：正常绘制
                    drawLine(lastX, lastY, pos.x, pos.y);
                    lastX = pos.x;
                    lastY = pos.y;
                }
            }, { passive: false });

            canvas.addEventListener('pointerup', function(e) {
                if (isDrawing) {
                    const currentShape = container.canvasState.currentShape;
                    
                    if (currentShape === 'curve' && container.canvasState.curvePoints.length > 1) {
                        // 曲线模式：完成最终绘制
                        if (container.canvasState.shapePreviewData) {
                            ctx.putImageData(container.canvasState.shapePreviewData, 0, 0);
                        }
                        drawCurve(container.canvasState.curvePoints);
                        container.canvasState.curvePoints = [];
                        container.canvasState.shapePreviewData = null;
                    } else if (currentShape && container.canvasState.shapeStartPos) {
                        // 图形模式：完成最终绘制
                        const pos = getPointerPos(e);
                        if (container.canvasState.shapePreviewData) {
                            ctx.putImageData(container.canvasState.shapePreviewData, 0, 0);
                        }
                        drawShape(
                            container.canvasState.shapeStartPos.x,
                            container.canvasState.shapeStartPos.y,
                            pos.x, pos.y,
                            currentShape,
                            false
                        );
                        // 清除图形状态
                        container.canvasState.shapeStartPos = null;
                        container.canvasState.shapePreviewData = null;
                    }
                    
                    saveCanvasImage(containerId, type, errId);
                }
                isDrawing = false;
                canvas.releasePointerCapture(e.pointerId);
            });

            canvas.addEventListener('pointercancel', function(e) {
                isDrawing = false;
                canvas.releasePointerCapture(e.pointerId);
            });

            canvas.addEventListener('pointerleave', function(e) {
                if (isDrawing) {
                    saveCanvasImage(containerId, type, errId);
                }
                isDrawing = false;
            });

            // 禁用触摸默认行为（防止页面滚动）
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            // 确保Canvas获取焦点以接收Pointer Events
            canvas.style.touchAction = 'none';
            canvas.setAttribute('touch-action', 'none');

            // 存储画布状态
            container.canvasState = {
                ctx: ctx,
                strokeColor: strokeColor,
                strokeWidth: strokeWidth,
                isEraser: isEraser,
                dpr: dpr,
                currentShape: null,
                shapeStartPos: null,
                shapePreviewData: null,
                history: [],
                maxHistory: 20,
                lineStyle: 'solid', // 'solid' 实线 | 'dash' 虚线
                curvePoints: [], // 曲线经过的点
                bgImageData: bgImageData || null, // 背景题目图片
                displayWidth: displayWidth,
                displayHeight: displayHeight
            };
        }

        // ============================================
        // Canvas 工具函数
        // ============================================
        function saveHistory(containerId) {
            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;
            
            const canvas = document.getElementById('canvas_' + containerId);
            if (!canvas) return;
            
            // 保存当前Canvas状态到历史记录
            const imageData = canvas.toDataURL('image/png');
            container.canvasState.history.push(imageData);
            
            // 限制历史记录数量
            if (container.canvasState.history.length > container.canvasState.maxHistory) {
                container.canvasState.history.shift();
            }
        }

        function undoCanvas(containerId) {
            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;
            
            if (container.canvasState.history.length === 0) {
                alert('没有可撤销的操作');
                return;
            }
            
            // 取出上一个状态
            const previousState = container.canvasState.history.pop();
            const canvas = document.getElementById('canvas_' + containerId);
            const ctx = canvas.getContext('2d');
            
            // 恢复Canvas状态
            const img = new Image();
            img.onload = function() {
                // 必须先重置变换矩阵，避免dpr缩放导致图片被放大
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            };
            img.src = previousState;
        }

        function redrawBackground(containerId) {
            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;
            const canvas = document.getElementById('canvas_' + containerId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = container.canvasState.dpr;
            const dw = container.canvasState.displayWidth;
            const dh = container.canvasState.displayHeight;
            const bgData = container.canvasState.bgImageData;
            
            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, dw, dh);
            ctx.restore();
            
            if (bgData) {
                const bgImg = new Image();
                bgImg.onload = function() {
                    ctx.save();
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    const scale = Math.min(dw / bgImg.width, dh / bgImg.height);
                    const w = bgImg.width * scale;
                    const h = bgImg.height * scale;
                    const x = (dw - w) / 2;
                    const y = (dh - h) / 2;
                    ctx.drawImage(bgImg, x, y, w, h);
                    ctx.restore();
                };
                bgImg.src = bgData;
            }
        }

        function clearCanvas(containerId) {
            if (!confirm('确定要清空整个画布吗？建议用"撤销"或"橡皮擦"部分修改！')) {
                return;
            }
            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;

        function insertSymbol(errId, type, symbol) {
            const containerId = type + '_' + errId;
            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;
            
            const overlay = document.getElementById('overlay_' + containerId);
            if (!overlay) return;
            
            const canvas = document.getElementById('canvas_' + containerId);
            if (!canvas) return;

            const color = container.canvasState.strokeColor || '#1a1a1a';
            const fontSize = (container.canvasState.strokeWidth || 3) * 12;

            // 自动关闭符号面板
            const panel = document.getElementById('symbols_' + containerId);
            if (panel) {
                panel.classList.remove('open');
            }

            // 创建可拖拽的符号元素
            const symEl = document.createElement('div');
            symEl.className = 'draggable-symbol';
            symEl.setAttribute('data-symbol', symbol);
            symEl.setAttribute('data-color', color);
            symEl.setAttribute('data-fontsize', fontSize);

            // 符号文字
            const symText = document.createElement('span');
            symText.textContent = symbol;
            symText.style.fontSize = fontSize + 'px';
            symText.style.color = color;
            symText.style.fontFamily = '"Times New Roman", serif';
            symText.style.pointerEvents = 'none';
            symEl.appendChild(symText);

            // 删除按钮
            const delBtn = document.createElement('button');
            delBtn.className = 'sym-delete';
            delBtn.textContent = '×';
            delBtn.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                symEl.remove();
                updateBakeBtn(containerId);
            });
            symEl.appendChild(delBtn);

            // 缩放手柄
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'sym-resize';
            resizeHandle.textContent = '⤡';
            resizeHandle.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startResize(e, symEl, symText);
            });
            symEl.appendChild(resizeHandle);

            // 放置位置：画布中心
            const rect = canvas.getBoundingClientRect();
            const startX = rect.width / 2 - 20;
            const startY = rect.height / 2 - 20;
            symEl.style.left = startX + 'px';
            symEl.style.top = startY + 'px';

            // 拖拽移动
            let isDragging = false;
            let dragOffsetX = 0, dragOffsetY = 0;

            symEl.addEventListener('pointerdown', function(e) {
                if (e.target === delBtn || e.target === resizeHandle) return;
                e.stopPropagation();
                e.preventDefault();
                isDragging = true;
                const symRect = symEl.getBoundingClientRect();
                const overlayRect = overlay.getBoundingClientRect();
                dragOffsetX = e.clientX - symRect.left;
                dragOffsetY = e.clientY - symRect.top;
                symEl.setPointerCapture(e.pointerId);
            });

            symEl.addEventListener('pointermove', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                const overlayRect = overlay.getBoundingClientRect();
                let newX = e.clientX - overlayRect.left - dragOffsetX;
                let newY = e.clientY - overlayRect.top - dragOffsetY;
                // 限制在画布范围内
                newX = Math.max(0, Math.min(newX, overlayRect.width - symEl.offsetWidth));
                newY = Math.max(0, Math.min(newY, overlayRect.height - symEl.offsetHeight));
                symEl.style.left = newX + 'px';
                symEl.style.top = newY + 'px';
            });

            symEl.addEventListener('pointerup', function(e) {
                isDragging = false;
            });

            overlay.appendChild(symEl);

            // 显示确认按钮
            updateBakeBtn(containerId);
        }

        // 缩放处理
        function startResize(e, symEl, symText) {
            e.preventDefault();
            const startFontSize = parseFloat(symText.style.fontSize);
            const startX = e.clientX;
            const startY = e.clientY;

            function onMove(ev) {
                ev.preventDefault();
                const dx = ev.clientX - startX;
                const dy = ev.clientY - startY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                // 对角线方向：右下放大，左上缩小
                const delta = (dx + dy) * 0.5;
                let newSize = Math.max(12, Math.min(200, startFontSize + delta));
                symText.style.fontSize = newSize + 'px';
                symEl.setAttribute('data-fontsize', newSize);
            }

            function onUp(ev) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }

        // 更新确认按钮状态
        function updateBakeBtn(containerId) {
            const overlay = document.getElementById('overlay_' + containerId);
            const bakeBtn = document.getElementById('bake_' + containerId);
            if (!overlay || !bakeBtn) return;
            const hasSymbols = overlay.querySelectorAll('.draggable-symbol').length > 0;
            if (hasSymbols) {
                bakeBtn.classList.add('show');
            } else {
                bakeBtn.classList.remove('show');
            }
        }

        // 将浮动符号烘焙到canvas
        function bakeSymbols(containerId) {
            const overlay = document.getElementById('overlay_' + containerId);
            const canvas = document.getElementById('canvas_' + containerId);
            if (!overlay || !canvas) return;

            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;

            const ctx = canvas.getContext('2d');
            const dpr = container.canvasState.dpr;
            const symbols = overlay.querySelectorAll('.draggable-symbol');

            if (symbols.length === 0) return;

            // 将每个符号绘制到canvas
            symbols.forEach(symEl => {
                const symbol = symEl.getAttribute('data-symbol');
                const color = symEl.getAttribute('data-color');
                const fontSize = parseFloat(symEl.getAttribute('data-fontsize'));
                const left = parseFloat(symEl.style.left);
                const top = parseFloat(symEl.style.top);

                ctx.save();
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.font = `${fontSize}px "Times New Roman", serif`;
                ctx.fillStyle = color;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(symbol, left + 4, top + 4);
                ctx.restore();
            });

            // 清空overlay
            overlay.innerHTML = '';
            updateBakeBtn(containerId);

            // 保存图像
            const type = containerId.match(/^(wrong|analysis|correct)/)[1];
            const errId = containerId.replace(/^(wrong_|analysis_|correct_)/, '');
            saveCanvasImage(containerId, type, errId);
        }

                switch (err.subject) {
                    case '数学': stats.math++; break;
                    case '物理': stats.physics++; break;
                    case '英语': stats.english++; break;
                    case '语文': stats.chinese++; break;
                    case '化学': stats.chemistry++; break;
                    case '生物': stats.biology++; break;
                }
            });

            document.getElementById('statsInfo').textContent = 
                `错题总数：${stats.total} | 数学: ${stats.math} | 物理: ${stats.physics} | 英语: ${stats.english} | 语文: ${stats.chinese} | 化学: ${stats.chemistry} | 生物: ${stats.biology}`;
        }

        // ============================================
        // 导入导出
        // ============================================
        function exportPDF() {
            const filteredData = getFilteredData();
            if (filteredData.length === 0) {
                alert('暂无错题可导出');
                return;
            }

            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '');
            const subjects = [...new Set(filteredData.map(e => e.subject))];
            const subjectStr = subjects.join('_');
            const docTitle = `错题本_${dateStr}_${timeStr}_${subjectStr}_${filteredData.length}道`;

            // 确保所有错题卡片已渲染（canvas才存在），然后收集canvas图片
            const container = document.getElementById('errorCardsContainer');
            document.getElementById('emptyState').style.display = 'none';
            filteredData.forEach(err => {
                if (!document.getElementById('card_' + err.id)) {
                    renderErrorCard(err.id);
                }
            });
            // 等canvas初始化完成后再截图
            setTimeout(() => {
                const canvasImages = {};
                filteredData.forEach(err => {
                    canvasImages[err.id] = {};
                    ['wrong', 'analysis', 'correct'].forEach(type => {
                        const canvasEl = document.getElementById('canvas_' + type + '_' + err.id);
                        if (canvasEl) {
                            canvasImages[err.id][type] = canvasEl.toDataURL('image/png');
                        }
                    });
                });
                openPrintWindow(docTitle, filteredData, canvasImages);
            }, 300);
            return;
        }

        function openPrintWindow(docTitle, filteredData, canvasImages) {

            // 构建打印HTML
            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${docTitle}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@page{margin:12mm 10mm;size:A4;}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;color:#333;background:#fff;line-height:1.5;font-size:12px;}
.err-page{page-break-after:always;padding-bottom:10px;}
.err-page:last-child{page-break-after:auto;}
.page-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;border-bottom:2px solid #4a4a4a;margin-bottom:12px;}
.page-header h2{font-size:18px;color:#4a4a4a;letter-spacing:2px;}
.page-header .header-date{font-size:11px;color:#999;}
.meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;padding-bottom:6px;border-bottom:1px dashed #ddd;}
.meta-item{display:flex;align-items:center;gap:4px;}
.meta-label{color:#999;}
.meta-val{font-weight:600;}
.stars-print{color:#F39C12;letter-spacing:1px;font-size:14px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{background:#f5f0e6;color:#8b6914;padding:1px 8px;border-radius:8px;font-size:11px;}
.section-title{font-size:14px;font-weight:700;padding:6px 14px;border-radius:4px;margin:10px 0 8px;display:flex;align-items:center;gap:6px;}
.section-title.orange{background:#fef3e2;color:#b8860b;border-left:4px solid #e8a838;}
.section-title.green{background:#e8f8f0;color:#1a7a4a;border-left:4px solid #27ae60;}
.sub-title{font-size:12px;font-weight:600;margin:6px 0 4px;padding-left:8px;border-left:3px solid #ccc;}
.sub-title.wrong-t{border-left-color:#E74C3C;color:#c0392b;}
.sub-title.analysis-t{border-left-color:#F39C12;color:#b8860b;}
.sub-title.correct-t{border-left-color:#2980B9;color:#2980B9;}
.canvas-print{border:1px solid #d4c4a8;border-radius:4px;overflow:hidden;background:#fff;}
.canvas-print img{width:100%;display:block;}
.empty-hint{padding:20px;text-align:center;color:#ccc;font-size:11px;}
.wrong-area{margin-bottom:8px;}
.wrong-area .canvas-print img{max-height:340px;object-fit:contain;}
.two-col{display:flex;gap:12px;}
.two-col .col{flex:1;min-width:0;}
.two-col .canvas-print img{max-height:220px;object-fit:contain;}
.divider{border:none;border-top:1px dashed #d4c4a8;margin:8px 0;}
</style></head><body>`;

            filteredData.forEach((err, idx) => {
                const stars = '★'.repeat(err.importance || 0) + '☆'.repeat(5 - (err.importance || 0));
                const errorTags = (err.error_types || []).map(t => `<span class="tag">${t}</span>`).join('');
                const otherReason = err.error_types && err.error_types.includes('其他原因') && err.other_reason ? `<span class="tag">${err.other_reason}</span>` : '';

                // 取canvas图片：优先用当前画布截图，其次用保存的数据
                const wrongImg = canvasImages[err.id]?.wrong || err.wrong_answer_image || '';
                const analysisImg = canvasImages[err.id]?.analysis || err.analysis_image || '';
                const correctImg = canvasImages[err.id]?.correct || err.correct_solution_image || '';

                html += `<div class="err-page">`;

                // 页面标题
                html += `<div class="page-header"><h2>📋 错题本</h2><span class="header-date">${err.date || ''} | ${err.subject || ''}</span></div>`;

                // 元信息
                html += `<div class="meta-row">
                    <div class="meta-item"><span class="meta-label">日期</span><span class="meta-val">${err.date || '-'}</span></div>
                    <div class="meta-item"><span class="meta-label">科目</span><span class="meta-val">${err.subject || '-'}</span></div>
                    <div class="meta-item"><span class="meta-label">来源</span><span class="meta-val">${err.source || '-'}</span></div>
                    <div class="meta-item"><span class="meta-label">重要</span><span class="stars-print">${stars}</span></div>
                </div>`;
                if (err.error_types && err.error_types.length > 0) {
                    html += `<div style="margin-bottom:6px;font-size:12px;"><span class="meta-label">错因</span> <div class="tags" style="display:inline-flex;gap:4px;">${errorTags}${otherReason}</div></div>`;
                }
                if (err.topic) {
                    html += `<div style="margin-bottom:8px;font-size:12px;"><span class="meta-label">知识点</span> <span class="meta-val">${err.topic}</span></div>`;
                }

                // 题目 & 错题（占上半大部分）
                html += `<div class="section-title orange">📝 题目 & 错题</div>`;
                html += `<div class="wrong-area">`;
                html += `<div class="sub-title wrong-t">❌ 错题区</div>`;
                html += `<div class="canvas-print">`;
                if (wrongImg) {
                    html += `<img src="${wrongImg}" />`;
                } else {
                    html += `<div class="empty-hint">（无内容）</div>`;
                }
                html += `</div></div>`;

                html += `<hr class="divider">`;

                // 解析 & 正解（下半部分左右并排）
                html += `<div class="section-title green">💡 解析 & 正解</div>`;
                html += `<div class="two-col">`;
                html += `<div class="col"><div class="sub-title analysis-t">🔍 错因分析</div><div class="canvas-print">`;
                if (analysisImg) {
                    html += `<img src="${analysisImg}" />`;
                } else {
                    html += `<div class="empty-hint">（无内容）</div>`;
                }
                html += `</div></div>`;
                html += `<div class="col"><div class="sub-title correct-t">✅ 正确解答</div><div class="canvas-print">`;
                if (correctImg) {
                    html += `<img src="${correctImg}" />`;
                } else {
                    html += `<div class="empty-hint">（无内容）</div>`;
                }
                html += `</div></div>`;
                html += `</div>`;
                html += `</div>`;
            });

            html += `</body></html>`;

            // 用隐藏iframe打印
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
            document.body.appendChild(iframe);
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
            iframe.onload = function() {
                setTimeout(() => {
                    iframe.contentWindow.focus();
                    iframe.contentWindow.print();
                    setTimeout(() => document.body.removeChild(iframe), 2000);
                }, 500);
            };
        }

        function exportJSON() {
            if (errorData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const dataStr = JSON.stringify(errorData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = '错题本_' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm(`确定要导入 ${imported.length} 道错题吗？这将覆盖现有数据。`)) {
                            errorData = imported;
                            saveToStorage();
                            renderErrorList();
                            updateStats();
                            if (errorData.length > 0) {
                                viewError(errorData[0].id);
                            }
                            alert('导入成功！');
                        }
                    } else {
                        alert('文件格式错误');
                    }
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================
        // 窗口大小变化时重新初始化Canvas
        // ============================================
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                // 重新初始化当前显示的卡片
                if (currentEditingId) {
                    const err = errorData.find(e => e.id === currentEditingId);
                    if (err) {
                        renderErrorCard(currentEditingId);
                    }
                }
            }, 250);
        });

        // 阻止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
