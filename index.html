            --bg-color: #FFF8E7;
            --card-bg: #FFFEF9;
            --border-color: #D4C4A8;
            --primary-color: #4A4A4A;
            --accent-red: #E74C3C;
            --accent-green: #27AE60;
            --accent-blue: #3498DB;
            --accent-gold: #F39C12;
            --toolbar-bg: #F5F0E6;
            --touch-target: 48px;
        }

        html, body {
            touch-action: manipulation;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "HarmonyOS Sans SC", "MiSans", sans-serif;
            background-color: var(--bg-color);
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    #E8DCC8 31px,
                    #E8DCC8 32px
                );
            min-height: 100vh;
            color: var(--primary-color);
            font-size: 16px;
        }

        /* 工具栏 - 平板优化 */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--toolbar-bg);
            border-bottom: 2px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            min-height: 64px;
        }

        .toolbar-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #8B7355;
            margin-right: 10px;
        }

        .toolbar-btn {
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: var(--touch-target);
            min-width: var(--touch-target);
            justify-content: center;
        }

        .toolbar-btn:hover {
            background: #EDE5D5;
            border-color: #B8A88A;
        }

        .toolbar-btn:active {
            transform: scale(0.97);
            background: #DDD5C5;
        }

        .toolbar-btn.primary {
            background: linear-gradient(135deg, #8B7355, #6B5344);
            color: white;
            border-color: #6B5344;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        .toolbar-btn.primary:hover {
            background: linear-gradient(135deg, #7A6348, #5A4338);
        }

        .stats-info {
            margin-left: auto;
            padding: 10px 18px;
            background: var(--card-bg);
            border-radius: 10px;
            font-size: 0.95em;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        /* 筛选区域 - 平板优化 */
        .filter-bar {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(255,248,231,0.97);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 999;
        }

        .filter-bar select, .filter-bar input {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            font-size: 1em;
            min-height: var(--touch-target);
        }

        .filter-bar label {
            font-size: 1em;
            color: #666;
            white-space: nowrap;
        }

        /* 主布局 */
        .main-container {
            display: flex;
            margin-top: 130px;
            min-height: calc(100vh - 130px);
        }

        /* 侧边栏 - 抽屉式 */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--toolbar-bg);
            border-right: 2px solid var(--border-color);
            height: calc(100vh - 130px);
            overflow-y: auto;
            position: fixed;
            left: -300px;
            top: 130px;
            -webkit-overflow-scrolling: touch;
            z-index: 1001;
            transition: left 0.3s ease;
            box-shadow: 4px 0 16px rgba(0,0,0,0.15);
        }
        .sidebar.open {
            left: 0;
        }
        /* 抽屉遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .sidebar-overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            background: #EDE5D5;
            font-size: 1.1em;
        }

        .error-list {
            padding: 12px;
        }

        .error-card-preview {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .error-card-preview:hover {
            border-color: #B8A88A;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .error-card-preview:active {
            transform: scale(0.98);
        }

        .error-card-preview.active {
            border-color: #8B7355;
            border-width: 2px;
            background: #FFF9EE;
        }

        .error-card-preview .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .error-card-preview .preview-subject {
            font-weight: bold;
            color: #8B7355;
            font-size: 1em;
        }

        .error-card-preview .preview-date {
            font-size: 0.9em;
            color: #999;
        }

        .error-card-preview .preview-source {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .error-card-preview .preview-stars {
            color: var(--accent-gold);
            font-size: 1em;
        }

        .delete-btn {
            color: var(--accent-red);
            cursor: pointer;
            font-size: 0.95em;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 8px;
        }

        .delete-btn:hover {
            background: #FDEDEC;
        }

        /* 内容区 */
        .content-area {
            flex: 1;
            margin-left: 0;
            padding: 24px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: #999;
        }

        .empty-state h2 {
            font-size: 1.8em;
            margin-bottom: 16px;
            color: #B8A88A;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 24px;
        }

        /* 错题卡片 - 纸质笔记本风格 */
        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            margin-bottom: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
            padding-left: 40px;
        }
        /* 红色装订线 */
        .error-card::before {
            content: '';
            position: absolute;
            left: 36px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #CC4444;
            opacity: 0.5;
            z-index: 2;
        }
        /* 活页纸打孔装饰 */
        .error-card::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 30px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #CCC;
            background: var(--bg-color);
            box-shadow:
                0 80px 0 0 var(--bg-color), 0 80px 0 0 2px #CCC,
                0 160px 0 0 var(--bg-color), 0 160px 0 0 2px #CCC;
            z-index: 2;
        }

        .error-card-header {
            padding: 18px 24px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .header-field {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-field label {
            font-size: 1em;
            color: #666;
            white-space: nowrap;
            font-weight: 500;
        }

        .header-field input[type="date"],
        .header-field select,
        .header-field input[type="text"] {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            font-size: 1em;
            min-height: var(--touch-target);
        }

        .header-field input[type="text"] {
            width: 160px;
        }

        /* 星级评分 - 平板优化 */
        .star-rating {
            display: flex;
            gap: 4px;
        }

        .star {
            cursor: pointer;
            font-size: 1.5em;
            color: #DDD;
            transition: all 0.2s;
            padding: 4px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .star:active {
            transform: scale(1.2);
        }

        .star.active {
            color: var(--accent-gold);
        }

        /* 错因复选框 - 平板优化 */
        .error-types {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .error-type-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 1em;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .error-type-checkbox:hover {
            background: rgba(0,0,0,0.05);
        }

        .error-type-checkbox input {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        /* 卡片主体 - 竖版布局 */
        .card-body {
            display: flex;
            flex-direction: column;
        }

        .card-column {
            padding: 20px;
        }

        .card-column:first-child {
            border-right: none;
            border-bottom: 2px dashed var(--border-color);
        }

        /* 题目区全宽大画布 */
        .card-column.wrong-column .canvas-container canvas {
            min-height: 400px;
            max-height: 50vh;
        }

        /* 解析+正解并排区域 */
        .analysis-correct-row {
            display: flex;
            gap: 16px;
            padding: 0 20px 20px 20px;
        }
        .analysis-correct-row .analysis-col,
        .analysis-correct-row .correct-col {
            flex: 1;
            min-width: 0;
        }
        .analysis-correct-row .canvas-container canvas {
            min-height: 300px;
        }

        .column-header {
            font-weight: bold;
            padding: 10px 0;
            margin-bottom: 14px;
            font-size: 1.1em;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        .column-header.left {
            color: #B9770E;
        }

        .column-header.right {
            color: #1E8449;
        }

        /* 子区域 */
        .sub-section {
            margin-bottom: 24px;
        }

        .sub-section-title {
            font-size: 1.05em;
            color: #666;
            margin-bottom: 10px;
            padding-left: 8px;
            border-left: 4px solid var(--accent-gold);
            font-weight: 500;
        }

        .sub-section-title.wrong {
            border-left-color: var(--accent-red);
        }

        .sub-section-title.analysis {
            border-left-color: var(--accent-green);
        }

        .sub-section-title.correct {
            border-left-color: var(--accent-blue);
        }

        /* Canvas容器 - 核心优化 */
        .canvas-container {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: white;
            position: relative;
            overflow: visible;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .canvas-container canvas {
            display: block;
            width: 100%;
            min-height: 400px;
            cursor: crosshair;
            touch-action: none;
            outline: none;
        }

        /* 错因分析/正确解答区域也撑满 */
        .card-column .canvas-container canvas {
            min-height: 400px;
        }

        .canvas-area {
            position: relative;
        }

        /* 符号覆盖层 */
        .symbols-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: visible;
        }

        .draggable-symbol {
            position: absolute;
            pointer-events: auto;
            cursor: move;
            user-select: none;
            padding: 4px 8px;
            border: 2px dashed rgba(52, 152, 219, 0.6);
            border-radius: 6px;
            background: rgba(52, 152, 219, 0.08);
            touch-action: none;
            line-height: 1.2;
            white-space: nowrap;
            z-index: 10;
        }

        .draggable-symbol:active {
            opacity: 0.8;
        }

        .draggable-symbol .sym-delete {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 22px;
            height: 22px;
            background: #E74C3C;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
            pointer-events: auto;
            z-index: 11;
        }

        .draggable-symbol .sym-resize {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #3498DB;
            border: 2px solid white;
            border-radius: 4px;
            cursor: nwse-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            pointer-events: auto;
            z-index: 11;
        }

        .bake-btn {
            background: #27AE60 !important;
            color: white !important;
            border-color: #219a52 !important;
            display: none;
        }

        .bake-btn.show {
            display: flex;
        }

        /* ========== 可拖动图片图层 ========== */
        .draggable-image {
            position: absolute;
            pointer-events: auto;
            cursor: move;
            user-select: none;
            touch-action: none;
            z-index: 8;
            border: 2px dashed rgba(39, 174, 96, 0.7);
            border-radius: 4px;
            background: rgba(39, 174, 96, 0.05);
            transform-origin: center center;
        }
        .draggable-image img {
            display: block;
            width: 100%;
            height: 100%;
            max-width: none;
            pointer-events: none;
            -webkit-user-drag: none;
        }
        .draggable-image .img-delete {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 26px;
            height: 26px;
            background: #E74C3C;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
            pointer-events: auto;
            z-index: 11;
        }
        .draggable-image .img-rotate-handle {
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            background: #F39C12;
            border: 2px solid white;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            pointer-events: auto;
            z-index: 11;
            touch-action: none;
        }
        .draggable-image .img-rotate-line {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 1px;
            height: 10px;
            background: #F39C12;
            pointer-events: none;
        }
        .draggable-image .img-resize-handle {
            position: absolute;
            bottom: -12px;
            right: -12px;
            width: 26px;
            height: 26px;
            background: #3498DB;
            border: 2px solid white;
            border-radius: 50%;
            cursor: nwse-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            pointer-events: auto;
            z-index: 11;
            touch-action: none;
        }

        /* 裁切按钮 */
        .draggable-image .img-crop-btn {
            position: absolute;
            top: -12px;
            left: -12px;
            width: 26px;
            height: 26px;
            background: #9B59B6;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 11;
        }
        /* 已放置状态：仍然保持可选、可修改、可删除，边框和手柄始终可见 */
        .draggable-image.placed {
            border: 2px dashed rgba(39, 174, 96, 0.7) !important;
            background: rgba(39, 174, 96, 0.05) !important;
        }
        .draggable-image.placed .img-delete,
        .draggable-image.placed .img-rotate-handle,
        .draggable-image.placed .img-resize-handle,
        .draggable-image.placed .img-crop-btn {
            display: flex !important;
        }
        .draggable-image.placed .img-rotate-line {
            display: block !important;
        }

        /* 裁切遮罩 */
        .crop-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9;
        }
        .crop-overlay-mask {
            position: absolute;
            background: rgba(0,0,0,0.5);
        }
        /* 裁切手柄 */
        .crop-handle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #9B59B6;
            border: 2px solid white;
            border-radius: 2px;
            z-index: 12;
            pointer-events: auto;
            touch-action: none;
        }
        .crop-handle.top-left { top: -8px; left: -8px; cursor: nwse-resize; }
        .crop-handle.top-right { top: -8px; right: -8px; cursor: nesw-resize; }
        .crop-handle.bottom-left { bottom: -8px; left: -8px; cursor: nesw-resize; }
        .crop-handle.bottom-right { bottom: -8px; right: -8px; cursor: nwse-resize; }
        .crop-handle.top-center { top: -8px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .crop-handle.bottom-center { bottom: -8px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .crop-handle.left-center { top: 50%; left: -8px; transform: translateY(-50%); cursor: ew-resize; }
        .crop-handle.right-center { top: 50%; right: -8px; transform: translateY(-50%); cursor: ew-resize; }
        /* 裁切确认按钮 */
        .crop-confirm-bar {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 13;
        }
        .crop-confirm-bar button {
            padding: 4px 12px;
            border-radius: 4px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            pointer-events: auto;
        }
        .crop-confirm-btn { background: #27AE60; color: white; }
        .crop-cancel-btn { background: #95A5A6; color: white; }

        /* ========== 画布缩放视口 ========== */
        .canvas-viewport {
            overflow: hidden;
            position: relative;
            width: 100%;
            touch-action: none;
        }
        .canvas-zoom-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }
        .canvas-zoom-layer canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .zoom-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .zoom-indicator.visible {
            opacity: 1;
        }
        .zoom-reset-btn {
            position: absolute;
            bottom: 8px;
            right: 68px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 14px;
            font-size: 13px;
            cursor: pointer;
            z-index: 20;
            display: none;
            touch-action: manipulation;
        }
        .zoom-reset-btn.visible {
            display: block;
        }
        .zoom-reset-btn:active {
            background: rgba(0,0,0,0.8);
        }

        .view-mode-btn {
            margin-left: auto;
            background: #f5f5f5;
        }
        .view-mode-btn.active {
            background: linear-gradient(135deg, #8B7355, #6B5344) !important;
            color: #fff !important;
            border-color: #6B5344 !important;
        }

        /* Canvas工具栏 - 平板优化 */
        .canvas-tools {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: linear-gradient(180deg, #F8F6F2, #F0EDE7);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            align-items: center;
        }

        .canvas-tools button {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.15s;
            min-height: 36px;
            white-space: nowrap;
        }

        .canvas-tools button:hover {
            background: #EDE5D5;
        }

        .canvas-tools button:active {
            transform: scale(0.95);
            background: #DDD5C5;
        }

        .canvas-tools button.active {
            background: linear-gradient(135deg, #8B7355, #6B5344);
            color: white;
            border-color: #6B5344;
        }

        .canvas-tools .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #DDD;
            padding: 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* 符号面板 */

        /* 文本输入区 */

        /* 折叠功能 */

            cursor: pointer;

            background: #EDE5D5;
            border-radius: 8px;
            font-size: 0.95em;
            margin-left: auto;
            min-height: var(--touch-target);

        /* 保存/放弃操作栏 */
        .card-action-bar {

        .card-action-btn.save-btn {

        /* 草稿卡片样式 */

        /* 隐藏文件输入 */

        /* ========== 图片调整弹窗 ========== */
        .img-adjust-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;

            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .img-adjust-modal .modal-header {
            color: #fff;
            font-size: 18px;
            padding: 12px 20px;
            width: 100%;
            text-align: center;
            background: rgba(0,0,0,0.5);
        }
        .img-adjust-modal .viewport {
            position: relative;
            width: 80vw;
            height: 60vh;
            border: 3px solid #F39C12;

        }
        .img-adjust-modal .viewport img {

        .img-adjust-modal .controls {

            flex-wrap: wrap;
        }
        .img-adjust-modal .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .img-adjust-modal .controls .btn-confirm {
            background: #27AE60;
            color: #fff;
        }
        .img-adjust-modal .controls .btn-cancel {
            background: #888;
            color: #fff;
        }
        .img-adjust-modal .controls .zoom-slider {
            width: 160px;

        }
        .img-adjust-modal .zoom-label {
            color: #F39C12;
            font-size: 14px;
            min-width: 50px;
            text-align: center;
        }

        /* ========== OCR 识别结果弹窗 ========== */
        .ocr-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ocr-modal .ocr-content {
            background: #fff;
            border-radius: 12px;
            width: 85vw;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .ocr-modal .ocr-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .ocr-modal .ocr-header .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .ocr-modal .ocr-body {
            padding: 16px 20px;
            flex: 1;
            overflow-y: auto;
        }
        .ocr-modal .ocr-loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        .ocr-modal .ocr-loading .spinner {
            width: 40px; height: 40px;
            border: 4px solid #eee;
            border-top-color: #F39C12;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ocr-modal .ocr-text {
            width: 100%;
            min-height: 150px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
        }
        .ocr-modal .ocr-footer {
            padding: 12px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .ocr-modal .ocr-footer button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .ocr-modal .ocr-footer .btn-copy {
            background: #3498DB;
            color: #fff;
        }
        .ocr-modal .ocr-footer .btn-close {
            background: #eee;
            color: #333;
        }

        /* 响应式设计 - 竖版布局优化 */
        @media (max-width: 1400px) {
            .sidebar {
                width: 280px;
                min-width: 280px;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 260px;
                min-width: 260px;
            }
            .filter-bar {
                gap: 10px;
            }
            .error-card-header {
                padding: 14px 16px;
            }
            .header-field input[type="text"] {
                width: 130px;
            }
            .analysis-correct-row {
                flex-direction: column;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 260px;
                min-width: 260px;
            }
            .toolbar {
                padding: 10px 12px;
                gap: 10px;
            }

            }

        /* 打印样式 - 竖版 */
        @media print {
            body {
                background: white;
                background-image: none;
            }
            
            .toolbar, .filter-bar, .sidebar, .sidebar-overlay, .card-toggle {
                display: none !important;

            }

            .error-card:last-child {
                page-break-after: auto;
            }

            /* 打印时也显示红色装订线 */
            .error-card::before {
                left: 26px;
                background: #CC4444;
                opacity: 0.4;
            }
            .error-card::after {
                left: 4px;
            }
            
            .card-body {
                display: flex !important;
                flex-direction: column !important;
            }
            
            .card-column {
                min-height: auto;
                padding: 10px 15px;
            }

            .card-column:first-child {
                border-right: none;
                border-bottom: 2px dashed #CCC;
            }

            .analysis-correct-row {
                display: flex !important;
                gap: 12px;
            }
            
            .canvas-container canvas {
                min-height: auto;
            }
            
            .canvas-tools {
                display: none !important;
            }
            
            .canvas-container {
                border: 1px solid #CCC;
            }
            
            .column-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .error-card-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            @page {
                size: A4;
                margin: 15mm;
            }
        }

        /* 高对比度模式支持 */
        @media (prefers-contrast: high) {
            .toolbar-btn, .canvas-tools button {
                border-width: 2px;
            }
        }

        /* 减少动画 */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
        
        /* 图形类型切换按钮 */
        .canvas-tools button.shape-toggle-btn {

        /* 工具面板 */
        .tool-panel {

<body>
    <!-- 工具栏 -->
    <div class="toolbar">
        <button class="toolbar-btn" onclick="toggleSidebar()" id="sidebarToggleBtn" style="font-size:1.1em;">📋 列表</button>
        <span class="toolbar-title">📒 错题本</span>
        <span id="appVersion" style="font-size:12px;color:#999;margin-left:6px;"></span>
        <button class="toolbar-btn primary" onclick="addNewError()" id="addNewBtn" title="">
            ➕ 添加新错题
        </button>
        <button class="toolbar-btn" onclick="exportPDF()">
            🖨️ 导出PDF
        </button>
        <button class="toolbar-btn" onclick="document.getElementById('importFile').click()">
            📂 导入数据
        </button>
        <button class="toolbar-btn" onclick="exportJSON()">
            💾 导出数据
        </button>
        <button class="toolbar-btn" onclick="backupData()">
            📦 备份
        </button>
        <button class="toolbar-btn" onclick="githubBackup()" id="githubBackupBtn" title="备份到GitHub">
            ☁️ 云备份
        </button>
        <button class="toolbar-btn" onclick="showErrorBookSettings()" title="错题本设置">
            ⚙️ 设置
        </button>
        <input type="file" id="importFile" class="hidden-input" accept=".json" onchange="importJSON(event)">
        <div class="stats-info" id="statsInfo">
            错题总数：0 | 数学: 0 | 物理: 0 | 英语: 0 | 语文: 0 | 化学: 0 | 生物: 0
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <label>筛选：</label>
        <select id="filterSubject" onchange="applyFilters()">
            <option value="">全部科目</option>
            <option value="数学">数学</option>
            <option value="物理">物理</option>
            <option value="英语">英语</option>
            <option value="语文">语文</option>
            <option value="化学">化学</option>
            <option value="生物">生物</option>
        </select>
        <label>日期从：</label>
        <input type="date" id="filterDateFrom" onchange="applyFilters()">
        <label>至：</label>
        <input type="date" id="filterDateTo" onchange="applyFilters()">
        <button class="toolbar-btn" onclick="clearFilters()">清除筛选</button>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 抽屉遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header" style="display:flex;justify-content:space-between;align-items:center;">
                <span>📋 错题列表（共 <span id="sidebarCount">0</span> 道）<span id="draftHint" style="display:none;background:#f39c12;color:#fff;border-radius:8px;padding:1px 8px;font-size:11px;margin-left:6px;vertical-align:middle;"></span></span>
                <button onclick="deleteAllErrors()" style="background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap;" onmouseover="this.style.background='#c0392b'" onmouseout="this.style.background='#e74c3c'">🗑️ 一键清空</button>

                    🗑️ 回收站 <span id="trashCount" style="background:#e74c3c;color:#fff;border-radius:10px;padding:1px 8px;font-size:12px;display:none;">0</span>

            <div id="errorCardsContainer"></div>
        </div>

    <script>
        // ============================================
        // 数据存储
        // ============================================
        let errorData = [];
        let currentEditingId = null;
        const SUBJECTS = ['数学', '物理', '英语', '语文', '化学', '生物', '历史', '地理', '政治'];
        const ERROR_TYPES = ['概念模糊', '思路错误', '计算错误', '其他原因'];

        // ============================================
        // 初始化
        // ============================================
        // 抽屉侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const versionEl = document.getElementById('appVersion');
            if (versionEl && typeof APP_VERSION !== 'undefined') versionEl.textContent = 'v' + APP_VERSION;
            loadFromStorage();
            cleanExpiredTrash();
            renderErrorList();
            updateStats();
            updateTrashCount();
            // 页面加载时，恢复未保存的草稿卡片到编辑区
            const drafts = errorData.filter(e => e.saved === false);
            if (drafts.length > 0) {
                drafts.forEach(err => {
                    renderErrorCard(err.id);
                });
                // 自动切换到最新的草稿
                currentEditingId = drafts[0].id;
                renderErrorList();
            } else if (errorData.length > 0) {
                // 没有草稿但有已保存的题，显示第一道
                const savedItems = errorData.filter(e => e.saved !== false);
                if (savedItems.length > 0) {
                    viewError(savedItems[0].id);
                }
            }
            updateAddButton();
            trimVisibleCards();
        });

        // localStorage 操作
        function saveToStorage() {
            localStorage.setItem('errorBookData', JSON.stringify(errorData));
            updateStats();
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('errorBookData');
            if (stored) {
                errorData = JSON.parse(stored);
                // 兼容旧数据：缺少 saved 字段时默认为 true
                errorData.forEach(err => {
                    if (err.saved === undefined) err.saved = true;
                });
            } else {
                // 示例数据 - 演示用
                errorData = [
                    {

        // 手动备份功能
        function backupData() {
            if (errorData.length === 0) {
                alert('暂无数据可备份');
                return;
            }
            
            const dataStr = JSON.stringify(errorData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const timestamp = now.toISOString().split('T')[0] + '_' + 
                            now.toTimeString().split(' ')[0].replace(/:/g, '');
            a.download = `错题本_备份_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('备份成功！文件已保存到下载目录');
        }

        // 生成唯一ID
        function generateId() {
            return 'err_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // ============================================
        // 错题CRUD操作
        // ============================================
        function addNewError() {
            // 检查是否有未保存的草稿，有则不允许新建
            const hasDraft = errorData.some(e => e.saved === false);
            if (hasDraft) {
                alert('请先保存或放弃当前正在编辑的题目，再新建错题。');
                return;
            }
            // 保存当前编辑卡片的画布内容
            if (currentEditingId) {
                saveCanvasToData(currentEditingId);
                saveToStorage();
            }
            const newError = {
                id: generateId(),
                date: new Date().toISOString().split('T')[0],
                subject: '数学',
                source: '',
                importance: 3,
                error_types: [],
                topic: '',
                question_text: '',
                question_image: '',
                wrong_answer_image: '',
                analysis_image: '',
                correct_solution_image: '',
                topic_image: '',
                saved: false,
                created_at: new Date().toISOString()
            };
            errorData.unshift(newError);
            saveToStorage();
            renderErrorList();
            renderErrorCard(newError.id);
            scrollToCard(newError.id);
            updateAddButton();
            trimVisibleCards();
        }

        // 根据是否有草稿，禁用/启用「添加新错题」按钮
        function updateAddButton() {
            const btn = document.getElementById('addNewBtn');
            if (!btn) return;
            const hasDraft = errorData.some(e => e.saved === false);
            if (hasDraft) {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                btn.title = '请先保存或放弃当前题目后再新建';
            } else {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
                btn.title = '';
            }
        }

        // 限制编辑区最多显示2张卡片：当前编辑的 + 最近保存的
        function trimVisibleCards() {
            const container = document.getElementById('errorCardsContainer');
            if (!container) return;
            const allCards = container.querySelectorAll('.error-card');
            if (allCards.length <= 2) return;

            const keepIds = new Set();

            // 1. 保留当前正在编辑的卡片
            if (currentEditingId) {
                keepIds.add('card_' + currentEditingId);
            }

            // 2. 如果有草稿，保留草稿
            const draft = errorData.find(e => e.saved === false);
            if (draft) {
                keepIds.add('card_' + draft.id);
            }

            // 3. 如果还不够2张，补最近保存的（按created_at倒序）
            if (keepIds.size < 2) {
                const savedItems = errorData
                    .filter(e => e.saved !== false && !keepIds.has('card_' + e.id))
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                if (savedItems.length > 0) {
                    keepIds.add('card_' + savedItems[0].id);
                }
            }

            // 移除不在保留列表中的卡片
            allCards.forEach(card => {
                if (!keepIds.has(card.id)) {
                    card.remove();
                }
            });
        }

        function updateError(id, field, value) {
            const err = errorData.find(e => e.id === id);
            if (err) {
                err[field] = value;
                saveToStorage();
                if (field === 'subject' || field === 'importance') {
                    renderErrorList();
                }
                // 实时更新当前卡片上的星星显示
                if (field === 'importance') {
                    const starsContainer = document.getElementById('stars_' + id);
                    if (starsContainer) {
                        starsContainer.querySelectorAll('.star').forEach((star, idx) => {
                            star.classList.toggle('active', idx < value);
                        });
                    }
                }
                updateStats();
            }
        }

        function deleteError(id) {
            const err = errorData.find(e => e.id === id);
            if (!err) return;
            
            // 第一次确认：显示错题详情
            const confirmMsg = `确定要删除这道错题吗？\n\n` +
                             `科目：${err.subject}\n` +
                             `日期：${err.date}\n` +
                             `来源：${err.source || '无'}\n` +
                             `知识点：${err.topic || '无'}\n\n` +
                             `删除后可在回收站中恢复（30天内），请确认！`;
            
            if (confirm(confirmMsg)) {
                // 第二次确认：密码验证
                const password = prompt('请输入删除密码：');
                const deletePassword = localStorage.getItem('errorBookDeletePassword') || 'delete123';
                if (password === deletePassword) {
                    // 将错题移入回收站（而非永久删除）
                    const trashData = loadTrashData();
                    const trashedErr = JSON.parse(JSON.stringify(err));
                    trashedErr.deletedAt = new Date().toISOString();
                    trashData.push(trashedErr);
                    saveTrashData(trashData);
                    
                    // 从主数据中移除
                    errorData = errorData.filter(e => e.id !== id);
                    saveToStorage();
                    renderErrorList();
                    
                    const card = document.getElementById('card_' + id);
                    if (card) {
                        card.remove();
                    }
                    
                    if (currentEditingId === id) {
                        currentEditingId = null;
                        if (errorData.length === 0) {
                            document.getElementById('emptyState').style.display = 'block';
                        } else {
                            viewError(errorData[0].id);
                        }
                    }
                    updateStats();
                    updateTrashCount();
                    alert('已移入回收站，30天内可恢复');
                } else if (password !== null) {
                    alert('密码错误，删除取消');
                }
            }
        }

        function deleteAllErrors() {
            const savedCount = errorData.filter(e => e.saved !== false).length;
            const draftCount = errorData.filter(e => e.saved === false).length;
            if (errorData.length === 0) {
                alert('当前没有错题记录');
                return;
            }
            let msg = `确定要清空全部 ${savedCount} 道已保存错题吗？`;
            if (draftCount > 0) msg += `\n（另有 ${draftCount} 个未保存草稿也将被删除）`;
            msg += '\n\n删除后可在回收站中恢复（30天内）！';
            if (!confirm(msg)) return;
            const password = prompt('请输入删除密码：');
            const deletePassword2 = localStorage.getItem('errorBookDeletePassword') || 'delete123';
            if (password === deletePassword2) {
                // 将所有错题移入回收站
                const trashData = loadTrashData();
                const now = new Date().toISOString();
                errorData.forEach(err => {
                    const trashedErr = JSON.parse(JSON.stringify(err));
                    trashedErr.deletedAt = now;
                    trashData.push(trashedErr);
                });
                saveTrashData(trashData);
                
                errorData = [];
                saveToStorage();
                renderErrorList();
                currentEditingId = null;
                document.getElementById('errorCardsContainer').innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
                updateStats();
                updateTrashCount();
                alert('已全部移入回收站');
            } else if (password !== null) {
                alert('密码错误，删除取消');
            }
        }

        function viewError(id) {
            // 切换前，保存当前编辑卡片的画布内容（防止草稿内容丢失）
            if (currentEditingId && currentEditingId !== id) {
                saveCanvasToData(currentEditingId);
                saveToStorage();
            }
            currentEditingId = id;
            renderErrorList();
            renderErrorCard(id);
            scrollToCard(id);
            trimVisibleCards();
            // 关闭抽屉侧边栏
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            }
        }

        function scrollToCard(id) {
            const card = document.getElementById('card_' + id);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // ============================================
        // 列表渲染
        // ============================================
        function renderErrorList() {
            const filteredData = getFilteredData();
            const listEl = document.getElementById('errorList');
            const sidebarCount = document.getElementById('sidebarCount');
            // 只统计已保存的错题
            const savedFilteredData = filteredData.filter(err => err.saved !== false);
            sidebarCount.textContent = savedFilteredData.length;

            // 显示草稿数量提示
            const draftCount = errorData.filter(err => err.saved === false).length;
            const draftHint = document.getElementById('draftHint');
            if (draftHint) {
                if (draftCount > 0) {
                    draftHint.textContent = `${draftCount} 个草稿`;
                    draftHint.style.display = 'inline';
                } else {
                    draftHint.style.display = 'none';
                }
            }

            if (savedFilteredData.length === 0) {
                listEl.innerHTML = '<p style="text-align:center;color:#999;padding:24px;font-size:1em;">暂无错题</p>';
                return;
            }

            listEl.innerHTML = savedFilteredData.map(err => `
                <div class="error-card-preview ${err.id === currentEditingId ? 'active' : ''}" 
                     onclick="viewError('${err.id}')">
                    <div class="preview-header">
                        <span class="preview-subject">${err.subject}</span>
                        <span class="preview-date">${err.date}</span>
                    </div>
                    <div class="preview-source">${err.source || '无来源'}</div>
                    <div class="preview-stars">${'★'.repeat(err.importance)}${'☆'.repeat(5-err.importance)}</div>
                    <span class="delete-btn" onclick="event.stopPropagation();deleteError('${err.id}')">🗑️ 删除</span>
                </div>
            `).join('');
        }

        function getFilteredData() {
            const subject = document.getElementById('filterSubject').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;

            return errorData.filter(err => {
                if (subject && err.subject !== subject) return false;
                if (dateFrom && err.date < dateFrom) return false;
                if (dateTo && err.date > dateTo) return false;
                return true;
            });
        }

        function applyFilters() {
            renderErrorList();
        }

        function clearFilters() {
            document.getElementById('filterSubject').value = '';
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            renderErrorList();
        }

            }

            // 移除草稿视觉提示

                card.classList.remove('draft-card');
                // 移除草稿横幅

        function discardError(id) {
            const err = errorData.find(e => e.id === id);
            if (!err) return;

            const isDraft = err.saved === false;
            const confirmMsg = isDraft
                ? '确定放弃这道错题？内容将丢失。'
                : '确定要删除这道错题吗？\n\n科目：' + err.subject + '\n日期：' + err.date + '\n来源：' + (err.source || '无') + '\n知识点：' + (err.topic || '无') + '\n\n删除后可在回收站中恢复（30天内），请确认！';

            if (confirm(confirmMsg)) {
                if (isDraft) {
                    // 草稿直接删除，无需密码
                    errorData = errorData.filter(e => e.id !== id);
                    saveToStorage();
                    renderErrorList();

                    const card = document.getElementById('card_' + id);
                    if (card) card.remove();

                    if (currentEditingId === id) {
                        currentEditingId = null;
                        const savedItems = errorData.filter(e => e.saved !== false);
                        if (savedItems.length > 0) {
                            viewError(savedItems[0].id);
                        } else if (errorData.length === 0) {
                            document.getElementById('emptyState').style.display = 'block';
                        } else {
                            // 还有其他草稿
                            viewError(errorData[0].id);
                        }
                    }
                    updateStats();
                    updateAddButton();
                    trimVisibleCards();
                } else {
                    // 已保存的走原有删除流程（移入回收站）
                    const password = prompt('请输入删除密码：');
                    const deletePassword = localStorage.getItem('errorBookDeletePassword') || 'delete123';
                    if (password === deletePassword) {
                        const trashData = loadTrashData();
                        const trashedErr = JSON.parse(JSON.stringify(err));
                        trashedErr.deletedAt = new Date().toISOString();
                        trashData.push(trashedErr);
                        saveTrashData(trashData);

                        errorData = errorData.filter(e => e.id !== id);
                        saveToStorage();
                        renderErrorList();

                        const card = document.getElementById('card_' + id);
                        if (card) card.remove();

                        if (currentEditingId === id) {
                            currentEditingId = null;
                            const savedItems = errorData.filter(e => e.saved !== false);
                            if (savedItems.length > 0) {
                                viewError(savedItems[0].id);
                            } else if (errorData.length === 0) {
                                document.getElementById('emptyState').style.display = 'block';
                            } else {
                                viewError(errorData[0].id);
                            }
                        }
                        updateStats();
                        updateTrashCount();
                        alert('已移入回收站，30天内可恢复');
                    } else if (password !== null) {
                        alert('密码错误，删除取消');
                    }
                }
            }
        }

        // ========== 图片调整弹窗 ==========
        let adjustState = {
            img: null,
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            errorId: null,
            dataUrl: null,
            isDragging: false,
            lastX: 0,

        function openImageAdjustModal(dataUrl, errorId) {
            // 创建弹窗
            let modal = document.getElementById('imgAdjustModal');
            if (modal) modal.remove();

            modal = document.createElement('div');
            modal.id = 'imgAdjustModal';
            modal.className = 'img-adjust-modal';
            modal.innerHTML = `
                <div class="modal-header">📐 调整图片位置与大小（框内为裁切区域）</div>
                <div class="viewport" id="adjustViewport">
                    <img id="adjustImg" src="${dataUrl}" draggable="false">
                </div>
                <div class="controls">
                    <button class="btn-cancel" onclick="closeImageAdjustModal()">取消</button>
                    <span style="color:#fff;font-size:14px;">🔍</span>
                    <input type="range" class="zoom-slider" id="zoomSlider" min="10" max="500" value="100"
                           oninput="adjustZoom(this.value)">
                    <span class="zoom-label" id="zoomLabel">100%</span>
                    <button class="btn-confirm" onclick="confirmImageAdjust()">✓ 确认放置</button>
                </div>
            `;
            document.body.appendChild(modal);

            // 初始化状态
            const img = document.getElementById('adjustImg');
            const viewport = document.getElementById('adjustViewport');
            
            adjustState = {
                img: img,
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                errorId: errorId,
                dataUrl: dataUrl,
                isDragging: false,
                lastX: 0,
                lastY: 0,
                pinchDist: 0
            };

            // 图片加载后初始化位置（居中适配）
            img.onload = function() {
                const vpRect = viewport.getBoundingClientRect();
                const imgW = img.naturalWidth;
                const imgH = img.naturalHeight;
                
                // 初始缩放：让图片适配视口
                const fitScale = Math.min(vpRect.width / imgW, vpRect.height / imgH);
                adjustState.scale = fitScale;
                
                // 居中
                const displayW = imgW * fitScale;
                const displayH = imgH * fitScale;
                adjustState.offsetX = (vpRect.width - displayW) / 2;
                adjustState.offsetY = (vpRect.height - displayH) / 2;
                
                updateImgTransform();
                
                // 更新滑块
                document.getElementById('zoomSlider').value = Math.round(fitScale * 100);
                document.getElementById('zoomLabel').textContent = Math.round(fitScale * 100) + '%';
            };

            // 绑定拖拽和缩放手势
            bindAdjustGestures(viewport);
        }

        function updateImgTransform() {
            const img = adjustState.img;
            if (!img) return;
            img.style.transform = `translate(${adjustState.offsetX}px, ${adjustState.offsetY}px) scale(${adjustState.scale})`;
        }

        function adjustZoom(val) {
            const viewport = document.getElementById('adjustViewport');
            const vpRect = viewport.getBoundingClientRect();
            const oldScale = adjustState.scale;
            const newScale = val / 100;
            
            // 以视口中心为缩放原点
            const centerX = vpRect.width / 2;
            const centerY = vpRect.height / 2;
            
            adjustState.offsetX = centerX - (centerX - adjustState.offsetX) * (newScale / oldScale);
            adjustState.offsetY = centerY - (centerY - adjustState.offsetY) * (newScale / oldScale);
            adjustState.scale = newScale;
            
            updateImgTransform();
            document.getElementById('zoomLabel').textContent = val + '%';
        }

        function bindAdjustGestures(viewport) {
            // 鼠标/触摸拖拽
            viewport.addEventListener('pointerdown', function(e) {
                if (e.pointerType === 'touch' && e.isPrimary === false) return;
                adjustState.isDragging = true;
                adjustState.lastX = e.clientX;
                adjustState.lastY = e.clientY;
                viewport.setPointerCapture(e.pointerId);
                e.preventDefault();
            });

            viewport.addEventListener('pointermove', function(e) {
                if (!adjustState.isDragging) return;
                const dx = e.clientX - adjustState.lastX;
                const dy = e.clientY - adjustState.lastY;
                adjustState.offsetX += dx;
                adjustState.offsetY += dy;
                adjustState.lastX = e.clientX;
                adjustState.lastY = e.clientY;
                updateImgTransform();
                e.preventDefault();
            });

            viewport.addEventListener('pointerup', function(e) {
                adjustState.isDragging = false;
            });

            // 鼠标滚轮缩放
            viewport.addEventListener('wheel', function(e) {
                e.preventDefault();
                const slider = document.getElementById('zoomSlider');
                let val = parseInt(slider.value);
                val += e.deltaY > 0 ? -10 : 10;
                val = Math.max(10, Math.min(500, val));
                slider.value = val;
                adjustZoom(val);
            }, { passive: false });

            // 双指缩放（触屏）
            let touchCache = [];
            viewport.addEventListener('touchstart', function(e) {
                touchCache = Array.from(e.touches);
                if (touchCache.length === 2) {
                    adjustState.pinchDist = getPinchDist(touchCache);
                }
            }, { passive: true });

            viewport.addEventListener('touchmove', function(e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const newDist = getPinchDist(Array.from(e.touches));
                    const ratio = newDist / adjustState.pinchDist;
                    
                    const slider = document.getElementById('zoomSlider');
                    let val = Math.round(parseFloat(slider.value) * ratio);
                    val = Math.max(10, Math.min(500, val));
                    slider.value = val;
                    adjustZoom(val);
                    
                    adjustState.pinchDist = newDist;
                }
            }, { passive: false });
        }

        function getPinchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function closeImageAdjustModal() {
            const modal = document.getElementById('imgAdjustModal');
            if (modal) modal.remove();
            adjustState = { img: null, scale: 1, offsetX: 0, offsetY: 0, errorId: null, dataUrl: null, isDragging: false, lastX: 0, lastY: 0, pinchDist: 0 };
        }

        function confirmImageAdjust() {
            const viewport = document.getElementById('adjustViewport');
            const img = adjustState.img;
            const id = adjustState.errorId;
            const vpRect = viewport.getBoundingClientRect();
            
            // 用canvas裁切出视口内的图片区域
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = vpRect.width;
            cropCanvas.height = vpRect.height;
            const cropCtx = cropCanvas.getContext('2d');
            
            // 计算图片在视口中的实际位置和大小
            const imgW = img.naturalWidth * adjustState.scale;
            const imgH = img.naturalHeight * adjustState.scale;
            
            cropCtx.drawImage(img, adjustState.offsetX, adjustState.offsetY, imgW, imgH);
            
            // 获取裁切后的dataUrl
            const croppedDataUrl = cropCanvas.toDataURL('image/png');
            
            // 关闭弹窗
            closeImageAdjustModal();
            
            // 设置为canvas背景
            updateError(id, 'question_image', croppedDataUrl);
            const container = document.getElementById('wrong_' + id);
            if (container && container.canvasState) {
                container.canvasState.bgImageData = croppedDataUrl;
                container.canvasState.history = [];
                redrawBackground('wrong_' + id);

                        const ctx = canvas.getContext('2d');

                            ctx.restore();
                            container.canvasState.history = [imgData];
                        }, 200);
                    }
                }, 100);

            if (ocrBtn) ocrBtn.style.display = '';
