                return stored ? JSON.parse(stored) : [];
            } catch(e) {
                return [];
            }
        }

        function saveTrashData(trashData) {
            localStorage.setItem('errorBookTrash', JSON.stringify(trashData));
        }

        // 清理超过30天的回收站数据
        function cleanExpiredTrash() {
            const trashData = loadTrashData();
            const now = Date.now();
            const thirtyDays = 30 * 24 * 60 * 60 * 1000;
            const cleaned = trashData.filter(item => {
                if (!item.deletedAt) return true; // 无删除时间戳的保留
                return (now - new Date(item.deletedAt).getTime()) < thirtyDays;
            });
            if (cleaned.length !== trashData.length) {
                saveTrashData(cleaned);
                console.log('[回收站] 已清理 ' + (trashData.length - cleaned.length) + ' 条过期数据');
            }
        }

        // 更新回收站数量角标
        function updateTrashCount() {
            const trashData = loadTrashData();
            const countEl = document.getElementById('trashCount');
            if (countEl) {
                if (trashData.length > 0) {
                    countEl.textContent = trashData.length;
                    countEl.style.display = 'inline';
                } else {
                    countEl.style.display = 'none';
                }
            }
        }

        // 格式化时间
        function formatDateTime(isoStr) {
            if (!isoStr) return '未知';
            const d = new Date(isoStr);
            return d.getFullYear() + '-' + 
                   String(d.getMonth()+1).padStart(2,'0') + '-' + 
                   String(d.getDate()).padStart(2,'0') + ' ' + 
                   String(d.getHours()).padStart(2,'0') + ':' + 
                   String(d.getMinutes()).padStart(2,'0');
        }

        // 计算剩余天数
        function getDaysLeft(deletedAt) {
            if (!deletedAt) return 30;
            const diff = 30 * 24 * 60 * 60 * 1000 - (Date.now() - new Date(deletedAt).getTime());
            return Math.max(0, Math.ceil(diff / (24 * 60 * 60 * 1000)));
        }

        // 显示回收站弹窗
        function showTrashModal() {
            const modal = document.getElementById('trashModal');
            modal.style.display = 'flex';
            renderTrashList();
        }

        function closeTrashModal() {
            document.getElementById('trashModal').style.display = 'none';
        }

        // 渲染回收站列表
        function renderTrashList() {
            const trashData = loadTrashData();
            const listEl = document.getElementById('trashList');

            if (trashData.length === 0) {
                listEl.innerHTML = '<p style="text-align:center;color:#999;padding:40px;font-size:15px;">回收站为空</p>';
                return;
            }

            // 按删除时间倒序
            const sorted = [...trashData].sort((a, b) => 
                new Date(b.deletedAt || 0) - new Date(a.deletedAt || 0)
            );

            listEl.innerHTML = sorted.map(item => {
                const daysLeft = getDaysLeft(item.deletedAt);
                const daysColor = daysLeft <= 3 ? '#e74c3c' : daysLeft <= 7 ? '#f39c12' : '#999';
                return `
                <div style="border:1px solid #e8dcc8;border-radius:8px;padding:12px;margin-bottom:8px;background:#fefcf7;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="background:#8B7355;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;">${item.subject || '未分类'}</span>
                            <span style="font-size:13px;color:#666;">${item.date || '-'}</span>
                        </div>
                        <span style="font-size:11px;color:${daysColor};">剩余${daysLeft}天</span>
                    </div>
                    <div style="font-size:13px;color:#999;margin-bottom:4px;">来源：${item.source || '无'} | 知识点：${item.topic || '无'}</div>
                    <div style="font-size:11px;color:#bbb;">删除时间：${formatDateTime(item.deletedAt)}</div>
                    <div style="display:flex;gap:6px;margin-top:8px;">
                        <button onclick="restoreError('${item.id}')" style="padding:4px 12px;border:1px solid #27AE60;background:#fff;color:#27AE60;border-radius:4px;cursor:pointer;font-size:12px;">♻️ 恢复</button>
                        <button onclick="permanentDelete('${item.id}')" style="padding:4px 12px;border:1px solid #e74c3c;background:#fff;color:#e74c3c;border-radius:4px;cursor:pointer;font-size:12px;">❌ 永久删除</button>
                    </div>
                </div>`;
            }).join('');
        }

        // 恢复错题
        function restoreError(id) {
            const trashData = loadTrashData();
            const item = trashData.find(e => e.id === id);
            if (!item) {
                alert('未找到该错题');
                return;
            }
            // 检查是否已存在同ID
            if (errorData.find(e => e.id === id)) {
                alert('该错题已存在于主列表中');
                return;
            }
            // 从回收站移除deletedAt字段后恢复
            delete item.deletedAt;
            errorData.push(item);
            saveToStorage();
            
            // 从回收站移除
            const newTrash = trashData.filter(e => e.id !== id);
            saveTrashData(newTrash);
            
            renderErrorList();
            updateStats();
            updateTrashCount();
            renderTrashList();
            
            // 渲染恢复的卡片
            renderErrorCard(id);
            
            alert('已恢复');
        }

        // 永久删除（需密码确认）
        function permanentDelete(id) {
            if (!confirm('永久删除后无法恢复，确定要继续吗？')) return;
            const password = prompt('请输入删除密码：');
            const deletePwd = localStorage.getItem('errorBookDeletePassword') || 'delete123';
            if (password === deletePwd) {
                let trashData = loadTrashData();
                trashData = trashData.filter(e => e.id !== id);
                saveTrashData(trashData);
                updateTrashCount();
                renderTrashList();
                alert('已永久删除');
            } else if (password !== null) {
                alert('密码错误');
            }
        }

        // 清空回收站
        function emptyTrash() {
            const trashData = loadTrashData();
            if (trashData.length === 0) {
                alert('回收站已为空');
                return;
            }
            if (!confirm(`确定要永久删除回收站中的全部 ${trashData.length} 道错题吗？

此操作不可恢复！`)) return;
            saveTrashData([]);
            updateTrashCount();
            renderTrashList();
            alert('回收站已清空');
        }
    </script>
</body>
</html>
