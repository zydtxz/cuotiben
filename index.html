        // 异步加载图片
        function loadImageAsync(src) {
            return new Promise(function(resolve) {
                if (!src) return resolve(null);
                const img = new Image();
                img.onload = function() { resolve(img); };
                img.onerror = function() { resolve(null); };
                img.src = src;
                setTimeout(function() { resolve(null); }, 10000);
            });
        }

        // 把错题区 canvas 和浮动图片合成为一张图（用于 PDF 导出）
        async function composeWrongImage(err) {
            const baseSrc = err.wrong_answer_image || '';
            if (!baseSrc || !err.wrong_image_overlay) return baseSrc;
            let states = [];
            try { states = JSON.parse(err.wrong_image_overlay); } catch(e) {}
            if (!states || states.length === 0) return baseSrc;

            const baseImg = await loadImageAsync(baseSrc);
            if (!baseImg) return baseSrc;

            const dpr = states[0].dpr || 1;
            const temp = document.createElement('canvas');
            temp.width = baseImg.width;
            temp.height = baseImg.height;
            const tctx = temp.getContext('2d');
            tctx.drawImage(baseImg, 0, 0);

            for (let i = 0; i < states.length; i++) {
                const state = states[i];
                const img = await loadImageAsync(state.src);
                if (!img) continue;
                const x = (state.left || 0) * dpr;
                const y = (state.top || 0) * dpr;
                const w = (state.width || img.naturalWidth) * dpr;
                const h = (state.height || img.naturalHeight) * dpr;
                tctx.save();
                if (state.rotation) {
                    const cx = x + w / 2;
                    const cy = y + h / 2;
                    tctx.translate(cx, cy);
                    tctx.rotate(state.rotation * Math.PI / 180);
                    tctx.translate(-cx, -cy);
                }
                tctx.drawImage(img, x, y, w, h);
                tctx.restore();
            }
            return temp.toDataURL('image/png');
        }

        async function doExportPDF(dataToExport) {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '');
            const subjects = [...new Set(dataToExport.map(e => e.subject))];
            const subjectStr = subjects.join('_');
            const docTitle = `错题本_${subjectStr}_${dateStr}_${dataToExport.length}道`;

            // 错题区图片需要和浮动图片合成，保证导出 PDF 内容完整
            const canvasImages = {};
            for (let i = 0; i < dataToExport.length; i++) {
                const err = dataToExport[i];
                let wrongSrc = err.wrong_answer_image || '';
                if (wrongSrc && err.wrong_image_overlay) {
                    wrongSrc = await composeWrongImage(err);
                }
                canvasImages[err.id] = {
                    wrong: wrongSrc,
                    analysis: err.analysis_image || '',
                    correct: err.correct_solution_image || '',
                    topic: err.topic_image || ''
                };
            }
            openPrintWindow(docTitle, dataToExport, canvasImages);
        }

                html += `<span><span class="hi">来源</span> <span class="hv">${err.source || '-'}</span></span>`;
                html += `<span><span class="hi">重要</span> <span class="stars-print">${stars}</span></span>`;
                if (err.error_types && err.error_types.length > 0) {
                    html += `<span><span class="hi">错因</span> ${errorTags}${otherReason}</span>`;
                }
                html += `</div>`;

                // 主体：上20%错因(仅右侧) + 下80%原题+改题并排
                html += `<div class="err-body">`;

                // 上排：左边知识点 + 右边错因(20%)
                html += `<div class="err-top">`;
                html += `<div class="spacer">`;
                html += `<div class="sub-title topic-t">📖 知识点</div>`;
                if (topicImg) {
                    html += `<div class="canvas-print" style="flex:1;"><img src="${topicImg}" /></div>`;
                } else if (err.topic) {
                    html += `<div class="topic-content">${err.topic}</div>`;
                }
                html += `</div>`;
                html += `<div class="analysis-area">`;
                html += `<div class="sub-title">🔍 错因</div>`;
                html += `<div class="canvas-print">`;
                if (analysisImg) {
                    html += `<img src="${analysisImg}" />`;
                } else if (err.error_types && err.error_types.length > 0) {
                    const otherTxt = err.error_types.includes('其他原因') && err.other_reason ? '；' + err.other_reason : '';
                    html += `<div style="padding:6px 8px;font-size:11px;color:#555;line-height:1.5;">${err.error_types.join('、')}${otherTxt}</div>`;
                } else {
                    html += `<div class="empty-hint">（未上传）</div>`;
                }
                html += `</div></div></div>`;

                // 下排：左原题(30%) + 右改题(70%)
                html += `<div class="err-bottom">`;
                html += `<div class="err-left">`;
                html += `<div class="sub-title">❌ 错题区</div>`;
                html += `<div class="canvas-print">`;
                if (wrongImg) {
                    html += `<img src="${wrongImg}" />`;
                } else {
                    html += `<div class="empty-hint">（未上传）</div>`;
                }
                html += `</div></div>`;
                html += `<div class="err-bottom-right">`;
                html += `<div class="sub-title">✅ 改题</div>`;
                html += `<div class="canvas-print">`;
                if (correctImg) {
                    html += `<img src="${correctImg}" />`;
                } else {
                    html += `<div class="empty-hint">（未上传）</div>`;
                }
                html += `</div></div></div>`;

                html += `</div>`; // err-body
                html += `</div>`; // err-item

                // 奇数索引（第二个错题）或最后一个：关闭页面
                if (idx % 2 === 1 || idx === filteredData.length - 1) {
                    html += `</div>`;
                }
            });

            html += `</body></html>`;

            // 使用 html2canvas + jsPDF 直接生成PDF文件
            generatePDF(html, docTitle, filteredData, canvasImages);
        }

        async function generatePDF(htmlContent, docTitle, filteredData, canvasImages) {
            const loading = document.createElement('div');
            loading.id = 'pdfLoading';
            loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:99999;color:#fff;font-size:18px;';
            loading.innerHTML = '<div style="text-align:center"><div style="font-size:24px;margin-bottom:12px">\u23f3</div><div id="pdfProgress">\u6b63\u5728\u751f\u6210PDF...</div></div>';
            document.body.appendChild(loading);
            const progEl = document.getElementById('pdfProgress');

            try {
                const PW = 1077, PH = 1528;
                const ML = 61;
                const CW = PW - ML - 30;

                // 加载图片
                const loadImg = (src) => new Promise(resolve => {
                    if (!src) return resolve(null);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = src;
                    setTimeout(() => resolve(null), 10000);
                });

                // 等比缩放绘制（contain）
                const drawContain = (ctx, x, y, maxW, maxH, img, borderColor) => {
                    const ratio = Math.min(maxW / img.width, maxH / img.height);
                    const dw = Math.round(img.width * ratio);
                    const dh = Math.round(img.height * ratio);
                    const dx = x + Math.round((maxW - dw) / 2);
                    const dy = y + Math.round((maxH - dh) / 2);
                    if (borderColor) {
                        ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
                        ctx.strokeRect(x + 0.5, y + 0.5, maxW - 1, maxH - 1);
                    }
                    ctx.drawImage(img, dx, dy, dw, dh);
                };

                // 计算图片非空白内容边界（透明或接近纯白视为空白）
                const getContentBounds = (img, threshold) => {
                    threshold = threshold || 760;
                    const w = img.width, h = img.height;
                    const oc = document.createElement('canvas');
                    oc.width = w; oc.height = h;
                    const octx = oc.getContext('2d');
                    octx.drawImage(img, 0, 0);
                    let data;
                    try { data = octx.getImageData(0, 0, w, h).data; } catch (e) { return null; }
                    let minX = w, minY = h, maxX = -1, maxY = -1;
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const i = (y * w + x) * 4;
                            if (data[i + 3] < 20) continue;
                            const sum = data[i] + data[i + 1] + data[i + 2];
                            if (sum < threshold) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }
                    if (maxX < 0) return null;
                    const pad = Math.max(8, Math.round(Math.max(maxX - minX + 1, maxY - minY + 1) * 0.03));
                    return {
                        x: Math.max(0, minX - pad),
                        y: Math.max(0, minY - pad),
                        w: Math.min(w, maxX - minX + 1 + pad * 2),
                        h: Math.min(h, maxY - minY + 1 + pad * 2)
                    };
                };

                // 裁剪掉四周空白后等比缩放，让实际内容撑满导出框（contain：完整内容，可能留白）
                const drawCroppedContain = (ctx, x, y, maxW, maxH, img, borderColor) => {
                    if (borderColor) {
                        ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
                        ctx.strokeRect(x + 0.5, y + 0.5, maxW - 1, maxH - 1);
                    }
                    const bounds = getContentBounds(img);
                    if (!bounds) return false;
                    const ratio = Math.min(maxW / bounds.w, maxH / bounds.h);
                    const dw = Math.round(bounds.w * ratio);
                    const dh = Math.round(bounds.h * ratio);
                    const dx = x + Math.round((maxW - dw) / 2);
                    const dy = y + Math.round((maxH - dh) / 2);
                    ctx.save();
                    ctx.beginPath(); ctx.rect(x + 0.5, y + 0.5, maxW - 1, maxH - 1); ctx.clip();
                    ctx.drawImage(img, bounds.x, bounds.y, bounds.w, bounds.h, dx, dy, dw, dh);
                    ctx.restore();
                    return true;
                };

                // 裁剪掉四周空白后等比铺满（cover：填满框，边缘可能被裁）
                const drawCroppedCover = (ctx, x, y, maxW, maxH, img, borderColor) => {
                    const bounds = getContentBounds(img);
                    if (bounds) {
                        const ratio = Math.max(maxW / bounds.w, maxH / bounds.h);
                        const dw = Math.round(bounds.w * ratio);
                        const dh = Math.round(bounds.h * ratio);
                        const dx = x + Math.round((maxW - dw) / 2);
                        const dy = y + Math.round((maxH - dh) / 2);
                        ctx.save();
                        ctx.beginPath(); ctx.rect(x, y, maxW, maxH); ctx.clip();
                        ctx.drawImage(img, bounds.x, bounds.y, bounds.w, bounds.h, dx, dy, dw, dh);
                        ctx.restore();
                    }
                    if (borderColor) {
                        ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
                        ctx.strokeRect(x + 0.5, y + 0.5, maxW - 1, maxH - 1);
                    }
                    return !!bounds;
                };

                // 限定在矩形框内的自动换行文字
                const drawWrappedText = (ctx, text, x, y, maxW, maxH, fontSize) => {
                    ctx.font = fontSize + 'px sans-serif';
                    const lineHeight = fontSize + 4;
                    const maxLines = Math.max(1, Math.floor(maxH / lineHeight));
                    const chars = String(text || '').split('');
                    let line = '';
                    const lines = [];
                    for (let i = 0; i < chars.length; i++) {
                        const ch = chars[i];
                        const test = line + ch;
                        if (ctx.measureText(test).width > maxW && line) {
                            lines.push(line);
                            line = ch;
                        } else {
                            line = test;
                        }
                    }
                    if (line) lines.push(line);
                    const renderLines = lines.slice(0, maxLines);
                    renderLines.forEach((l, idx) => ctx.fillText(l, x, y + (idx + 1) * lineHeight));
                    return renderLines.length * lineHeight;
                };

                const pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

                for (let pi = 0; pi < filteredData.length; pi += 2) {
                    if (progEl) progEl.textContent = '\u6b63\u5728\u751f\u6210PDF... (' + Math.min(pi + 2, filteredData.length) + '/' + filteredData.length + ')';

                    const canvas = document.createElement('canvas');
                    canvas.width = PW; canvas.height = PH;
                    const c = canvas.getContext('2d');
                    c.fillStyle = '#fff';
                    c.fillRect(0, 0, PW, PH);

                    const items = [filteredData[pi]];
                    if (pi + 1 < filteredData.length) items.push(filteredData[pi + 1]);

                    for (let ii = 0; ii < items.length; ii++) {
                        const err = items[ii];
                        const baseY = ii * Math.floor(PH / 2);
                        const itemH = Math.floor(PH / 2);

                        // 装订红线
                        c.save();
                        c.strokeStyle = 'rgba(204,68,68,0.4)'; c.lineWidth = 2;
                        c.beginPath(); c.moveTo(ML - 4, baseY); c.lineTo(ML - 4, baseY + itemH); c.stroke();
                        c.restore();

                        // ---- 头部 ----
                        const hy = baseY + 8;
                        const stars = '\u2605'.repeat(err.importance || 0) + '\u2606'.repeat(5 - (err.importance || 0));
                        c.font = '11px sans-serif';

                        const hdrItems = [
                            ['\u65e5\u671f', err.date || '-'],
                            ['\u79d1\u76ee', err.subject || '-'],
                            ['\u6765\u6e90', err.source || '-'],
                            ['\u91cd\u8981', stars],
                        ];
                        if (err.error_types && err.error_types.length > 0) {
                            hdrItems.push(['\u9519\u56e0', err.error_types.join('\u3001')]);
                        }

                        let hx = ML + 10;
                        hdrItems.forEach(([label, val]) => {
                            c.fillStyle = '#999';
                            c.font = '11px sans-serif';
                            c.fillText(label + '\uff1a', hx, hy + 12);
                            hx += c.measureText(label + '\uff1a').width + 2;
                            c.fillStyle = (label === '\u91cd\u8981') ? '#F39C12' : '#333';
                            c.font = (label === '\u91cd\u8981') ? 'bold 13px sans-serif' : 'bold 11px sans-serif';
                            c.fillText(val, hx, hy + 12);
                            hx += c.measureText(val).width + 16;
                        });

                        // 分割线
                        c.strokeStyle = '#eee'; c.lineWidth = 1;
                        c.beginPath(); c.moveTo(ML + 5, hy + 20); c.lineTo(PW - 10, hy + 20); c.stroke();

                        // ---- 主体区域 ----
                        const bodyY = hy + 28;
                        const bodyH = itemH - (bodyY - baseY) - 6;
                        const topH = Math.round(bodyH * 0.2);
                        const botH = bodyH - topH - 4;

                        // 上排：知识点(30%) + 错因(70%)
                        const topY = bodyY;
                        const spacerW = Math.round(CW * 0.3);
                        const analysisW = CW - spacerW - 6;

                        // 知识点标题
                        c.save();
                        c.strokeStyle = '#7B1FA2'; c.lineWidth = 2;
                        c.beginPath(); c.moveTo(ML + 6, topY + 4); c.lineTo(ML + 6, topY + 16); c.stroke();
                        c.font = 'bold 11px sans-serif'; c.fillStyle = '#7B1FA2';
                        c.fillText('\u77e5\u8bc6\u70b9', ML + 12, topY + 14);
                        c.restore();

                        const topicImgSrc = (canvasImages[err.id] && canvasImages[err.id].topic) || err.topic_image || '';
                        const tImg = await loadImg(topicImgSrc);
                        let hasTopicImg = false;
                        if (tImg) {
                            const imgH = Math.round((topH - 26) * 0.65);
                            const txtH = topH - 26 - imgH;
                            hasTopicImg = drawCroppedContain(c, ML + 10, topY + 20, spacerW - 16, imgH, tImg, '#d4c4a8');
                            if (hasTopicImg && err.topic) {
                                c.fillStyle = '#333';
                                drawWrappedText(c, err.topic, ML + 14, topY + 20 + imgH + 4, spacerW - 24, txtH - 8, 11);
                            }
                        }
                        if (!hasTopicImg && err.topic) {
                            c.fillStyle = '#333';
                            drawWrappedText(c, err.topic, ML + 14, topY + 26, spacerW - 24, topH - 36, 12);
                        }

                        // 错因标题
                        const ax = ML + 10 + spacerW + 6;
                        c.save();
                        c.strokeStyle = '#F39C12'; c.lineWidth = 2;
                        c.beginPath(); c.moveTo(ax - 4, topY + 4); c.lineTo(ax - 4, topY + 16); c.stroke();
                        c.font = 'bold 11px sans-serif'; c.fillStyle = '#b8860b';
                        c.fillText('\u9519\u56e0', ax, topY + 14);
                        c.restore();

                        const analysisImgSrc = (canvasImages[err.id] && canvasImages[err.id].analysis) || err.analysis_image || '';
                        const aImg = await loadImg(analysisImgSrc);
                        const errCauseTxt = (err.error_types && err.error_types.length > 0) ? err.error_types.join('\u3001') + (err.error_types.includes('\u5176\u4ed6\u539f\u56e0') && err.other_reason ? '\uff1b' + err.other_reason : '') : '';
                        let hasAnalysisImg = false;
                        if (aImg) {
                            hasAnalysisImg = drawCroppedContain(c, ax + 4, topY + 20, analysisW - 10, topH - 24, aImg, '#d4c4a8');
                        }
                        if (!hasAnalysisImg && errCauseTxt) {
                            c.fillStyle = '#555';
                            drawWrappedText(c, errCauseTxt, ax + 8, topY + 26, analysisW - 18, topH - 36, 11);
                        } else if (!hasAnalysisImg) {
                            c.font = '10px sans-serif'; c.fillStyle = '#ccc';
                            c.fillText('(\u672a\u4e0a\u4f20)', ax + 10, topY + 40);
                        }

                        // 下排：错题区(30%) + 改题(70%)
                        const botY = topY + topH + 4;
                        const leftW = Math.round(CW * 0.3);
                        const rightW = CW - leftW - 6;

                        // 错题区标题
                        c.save();
                        c.strokeStyle = '#E74C3C'; c.lineWidth = 3;
                        c.beginPath(); c.moveTo(ML + 6, botY + 5); c.lineTo(ML + 6, botY + 19); c.stroke();
                        c.font = 'bold 12px sans-serif'; c.fillStyle = '#c0392b';
                        c.fillText('\u9519\u9898\u533a', ML + 12, botY + 17);
                        c.restore();

                        const wrongImgSrc = (canvasImages[err.id] && canvasImages[err.id].wrong) || err.wrong_answer_image || '';
                        const wImg = await loadImg(wrongImgSrc);
                        if (wImg) {
                            const drawn = drawCroppedContain(c, ML + 10, botY + 24, leftW - 14, botH - 30, wImg, '#d4c4a8');
                            if (!drawn) {
                                c.font = '10px sans-serif'; c.fillStyle = '#ccc';
                                c.fillText('(\u672a\u4e0a\u4f20)', ML + 20, botY + 60);
                            }
                        } else {
                            c.font = '10px sans-serif'; c.fillStyle = '#ccc';
                            c.fillText('(\u672a\u4e0a\u4f20)', ML + 20, botY + 60);
                        }

                        // 改题标题
                        const rx = ML + 10 + leftW + 6;
                        c.save();
                        c.strokeStyle = '#2980B9'; c.lineWidth = 2;
                        c.beginPath(); c.moveTo(rx - 4, botY + 6); c.lineTo(rx - 4, botY + 19); c.stroke();
                        c.font = 'bold 11px sans-serif'; c.fillStyle = '#2980B9';
                        c.fillText('\u6539\u9898', rx, botY + 17);
                        c.restore();

                        const correctImgSrc = (canvasImages[err.id] && canvasImages[err.id].correct) || err.correct_solution_image || '';
                        const rImg = await loadImg(correctImgSrc);
                        if (rImg) {
                            const drawn = drawCroppedContain(c, rx + 4, botY + 24, rightW - 10, botH - 30, rImg, '#d4c4a8');
                            if (!drawn) {
                                c.font = '10px sans-serif'; c.fillStyle = '#ccc';
                                c.fillText('(\u672a\u4e0a\u4f20)', rx + 10, botY + 60);
                            }
                        } else {
                            c.font = '10px sans-serif'; c.fillStyle = '#ccc';
                            c.fillText('(\u672a\u4e0a\u4f20)', rx + 10, botY + 60);
                        }
                    }

                    // 分页虚线
                    if (pi + 2 < filteredData.length) {
                        c.save();
                        c.strokeStyle = '#d4c4a8'; c.lineWidth = 1;
                        c.setLineDash([5, 5]);
                        c.beginPath(); c.moveTo(0, PH - 1); c.lineTo(PW, PH - 1); c.stroke();
                        c.restore();
                    }

                    if (pi > 0) pdf.addPage();
                    const imgData = canvas.toDataURL('image/jpeg', 0.92);
                    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                }

                pdf.save(docTitle + '.pdf');
            } catch (err2) {
                console.error('PDF\u751f\u6210\u5931\u8d25:', err2);
                alert('PDF\u751f\u6210\u5931\u8d25: ' + err2.message + '\n\u5c06\u4f7f\u7528\u6d4f\u89c8\u5668\u6253\u5370\u65b9\u5f0f\u5bfc\u51fa');
                if (typeof fallbackPrint === 'function') fallbackPrint(htmlContent, docTitle);
            } finally {
                const l = document.getElementById('pdfLoading');
                if (l) l.remove();
            }
        }

        // 备用方案：浏览器打印
        function fallbackPrint(htmlContent, docTitle) {
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
            document.body.appendChild(iframe);
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();
            iframe.onload = function() {
                setTimeout(() => {
                    iframe.contentWindow.focus();
                    iframe.contentWindow.print();
                    setTimeout(() => document.body.removeChild(iframe), 2000);
                }, 500);
            };
        }

        function exportJSON() {
            if (errorData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const dataStr = JSON.stringify(errorData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = '错题本_' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm(`确定要导入 ${imported.length} 道错题吗？这将覆盖现有数据。`)) {
                            // 兼容旧数据：缺少 saved 字段时默认为 true
                            imported.forEach(err => {
                                if (err.saved === undefined) err.saved = true;
                            });
                            errorData = imported;
                            saveToStorage();
                            renderErrorList();
                            updateStats();
                            if (errorData.length > 0) {
                                viewError(errorData[0].id);
                            }
                            alert('导入成功！');
                        }
                    } else {
                        alert('文件格式错误');
                    }
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================
        // 窗口大小变化时重新初始化Canvas
        // ============================================
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                // 重新初始化当前显示的卡片
                if (currentEditingId) {
                    const err = errorData.find(e => e.id === currentEditingId);
                    if (err) {
                        renderErrorCard(currentEditingId);
                    }
                }
            }, 250);
        });

        // 阻止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        });

        // ============================================
        // bakeAll - 确认放置：隐藏图片手柄，烘焙符号
        // 图片仍为浮动图层，点击可重新激活编辑
        // 当所有图片都已placed时，点击按钮重新激活所有图片编辑
        // ============================================
        function bakeAll(containerId) {
            const overlay = document.getElementById('overlay_' + containerId);
            if (!overlay) return;

            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;

            const unplacedImages = overlay.querySelectorAll('.draggable-image:not(.placed)');
            const placedImages = overlay.querySelectorAll('.draggable-image.placed');

            if (unplacedImages.length > 0 || overlay.querySelectorAll('.draggable-symbol').length > 0) {
                // 有未放置的图片或符号：确认放置模式
                // 烘焙符号（符号仍真正烘焙到canvas），跳过自动保存
                bakeSymbols(containerId, true);

                // 图片不烘焙，改为标记已放置状态（隐藏手柄和边框）
                unplacedImages.forEach(function(imgEl) {
                    imgEl.classList.add('placed');
                });
            } else if (placedImages.length > 0) {
                // 所有图片都已placed：重新激活编辑
                placedImages.forEach(function(imgEl) {
                    imgEl.classList.remove('placed');
                });
            }

            updateBakeBtn(containerId);
        }

        // ============================================
        // bakeImages - 将 .draggable-image 烘焙到canvas
        // ============================================
        function bakeImages(containerId) {
            const overlay = document.getElementById('overlay_' + containerId);
            const canvas = document.getElementById('canvas_' + containerId);
            if (!overlay || !canvas) return;

            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;

            const ctx = canvas.getContext('2d');
            const dpr = container.canvasState.dpr;
            const images = overlay.querySelectorAll('.draggable-image');

            if (images.length === 0) return;

            // 逐个将图片绘制到canvas
            let pendingCount = images.length;
            const imagesToRemove = [];

            images.forEach(function(imgEl) {
                const img = imgEl.querySelector('img');
                if (!img) {
                    pendingCount--;
                    imagesToRemove.push(imgEl);
                    return;
                }

                // 获取位置和大小
                const left = parseFloat(imgEl.style.left) || 0;
                const top = parseFloat(imgEl.style.top) || 0;
                const width = parseFloat(imgEl.style.width) || img.naturalWidth;
                const height = parseFloat(imgEl.style.height) || img.naturalHeight;

                // 获取旋转角度
                const transform = imgEl.style.transform || '';
                let rotation = 0;
                const rotateMatch = transform.match(/rotate\(([^)]+)\)/);
                if (rotateMatch) {
                    rotation = parseFloat(rotateMatch[1]) * Math.PI / 180;
                }

                // 绘制到canvas（考虑缩放层）
                // 获取缩放层的缩放比例和偏移
                const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                let zoomScale = 1, panX = 0, panY = 0;
                if (zoomLayer && zoomLayer._zoomState) {
                    zoomScale = zoomLayer._zoomState.scale || 1;
                    panX = zoomLayer._zoomState.panX || 0;
                    panY = zoomLayer._zoomState.panY || 0;
                }

                // 计算实际canvas坐标（需要除以缩放比例）
                const canvasX = (left - panX) / zoomScale;
                const canvasY = (top - panY) / zoomScale;
                const canvasW = width / zoomScale;
                const canvasH = height / zoomScale;

                ctx.save();
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                if (rotation !== 0) {
                    // 旋转变换
                    const centerX = canvasX + canvasW / 2;
                    const centerY = canvasY + canvasH / 2;
                    ctx.translate(centerX, centerY);
                    ctx.rotate(rotation);
                    ctx.translate(-centerX, -centerY);
                }

                ctx.drawImage(img, canvasX, canvasY, canvasW, canvasH);
                ctx.restore();

                imagesToRemove.push(imgEl);
            });

            // 移除已烘焙的图片元素
            imagesToRemove.forEach(el => el.remove());
            updateBakeBtn(containerId);
            // 注意：不再在此处调用 saveCanvasImage，由 saveCanvasImage 调用 bakeImages 后自行保存
        }

        // ============================================
        // resetZoom - 重置缩放层到100%无偏移
        // ============================================
        function resetZoom(containerId) {
            const zoomLayer = document.getElementById('zoomlayer_' + containerId);
            const zoomIndicator = document.getElementById('zoom_' + containerId);
            const zoomResetBtn = document.getElementById('zoomreset_' + containerId);

            if (zoomLayer) {
                zoomLayer.style.transform = 'scale(1) translate(0px, 0px)';
                // 存储缩放状态
                zoomLayer._zoomState = { scale: 1, panX: 0, panY: 0 };
            }
            if (zoomIndicator) {
                zoomIndicator.textContent = '100%';
                zoomIndicator.classList.remove('visible');
            }
            if (zoomResetBtn) {
                zoomResetBtn.classList.remove('visible');
            }
        }

        // ============================================
        // 双指缩放+拖动平移 - canvas-viewport
        // ============================================
        (function initViewportZoom() {
            // 在DOM插入时初始化，使用MutationObserver监听新viewport
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(m) {
                    m.addedNodes.forEach(function(node) {
                        if (node.nodeType !== 1) return;
                        // 查找所有 canvas-viewport
                        const viewports = node.classList && node.classList.contains('canvas-viewport')
                            ? [node]
                            : Array.from(node.querySelectorAll('.canvas-viewport'));
                        viewports.forEach(bindViewportGestures);
                    });
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });

            // 对已存在的viewport也绑定
            document.querySelectorAll('.canvas-viewport').forEach(bindViewportGestures);
        })();

        // 限制平移范围，避免缩放后移出画布可写区域
        function clampPan(containerId, scale, panX, panY) {
            const container = document.getElementById(containerId);
            const viewport = document.getElementById('viewport_' + containerId);
            if (!container || !container.canvasState || !viewport) {
                return { panX: panX, panY: panY };
            }
            const vpRect = viewport.getBoundingClientRect();
            const cw = container.canvasState.canvasWidth;
            const ch = container.canvasState.canvasHeight;

            // 缩小时让画布居中；放大时限制不能移出画布边界
            if (scale <= 1) {
                panX = (vpRect.width - cw * scale) / 2;
                panY = (vpRect.height - ch * scale) / 2;
            } else {
                const minPanX = vpRect.width - cw * scale;
                const minPanY = vpRect.height - ch * scale;
                panX = Math.min(0, Math.max(minPanX, panX));
                panY = Math.min(0, Math.max(minPanY, panY));
            }
            return { panX: panX, panY: panY };
        }

        function bindViewportGestures(viewport) {
            if (viewport._zoomBound) return; // 避免重复绑定
            viewport._zoomBound = true;

            const activePointers = new Map(); // pointerId -> {x, y}
            viewport._activePointers = activePointers; // 供canvas绘制层判断多指状态
            let initialPinchDist = 0;
            let initialScale = 1;
            let initialPanX = 0;
            let initialPanY = 0;
            let initialMidX = 0;
            let initialMidY = 0;
            let isPinching = false;

            // 获取containerId
            const containerId = viewport.id ? viewport.id.replace('viewport_', '') : '';

            function viewModeActive() {
                const container = document.getElementById(containerId);
                return !!(container && container.canvasState && container.canvasState.viewMode);
            }

            viewport.addEventListener('pointerdown', function(e) {
                // 仅在“移动/缩放”模式下才处理双指手势，绘制模式下完全交给画布
                if (!viewModeActive()) return;

                activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

                if (activePointers.size === 2) {
                    // 双指开始 - 进入缩放/平移模式
                    isPinching = true;

                    const pts = Array.from(activePointers.values());
                    initialPinchDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    initialMidX = (pts[0].x + pts[1].x) / 2;
                    initialMidY = (pts[0].y + pts[1].y) / 2;

                    // 读取当前缩放状态
                    const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                    if (zoomLayer) {
                        if (!zoomLayer._zoomState) {
                            zoomLayer._zoomState = { scale: 1, panX: 0, panY: 0 };
                        }
                        initialScale = zoomLayer._zoomState.scale;
                        initialPanX = zoomLayer._zoomState.panX;
                        initialPanY = zoomLayer._zoomState.panY;
                    }

                    e.preventDefault();
                }
            });

            viewport.addEventListener('pointermove', function(e) {
                if (!activePointers.has(e.pointerId)) return;

                // 如果中途退出移动模式，清空手势状态
                if (!viewModeActive()) {
                    activePointers.clear();
                    isPinching = false;
                    return;
                }

                activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

                if (isPinching && activePointers.size === 2) {
                    e.preventDefault();

                    const pts = Array.from(activePointers.values());
                    const currentDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    const currentMidX = (pts[0].x + pts[1].x) / 2;
                    const currentMidY = (pts[0].y + pts[1].y) / 2;

                    // 计算新缩放（最小 0.5，允许缩小以查看完整内容）
                    let newScale = initialScale * (currentDist / initialPinchDist);
                    newScale = Math.max(0.5, Math.min(3, newScale));

                    // 计算平移（双指中心移动导致的偏移）
                    let panX = initialPanX + (currentMidX - initialMidX);
                    let panY = initialPanY + (currentMidY - initialMidY);

                    // 限制平移范围，保证缩放后仍能看到画布内容，且不会移出可写区域
                    const clamped = clampPan(containerId, newScale, panX, panY);
                    panX = clamped.panX;
                    panY = clamped.panY;

                    // 应用变换
                    const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                    if (zoomLayer) {
                        zoomLayer._zoomState = { scale: newScale, panX: panX, panY: panY };
                        zoomLayer.style.transform = `scale(${newScale}) translate(${panX / newScale}px, ${panY / newScale}px)`;
                    }

                    // 更新缩放指示器
                    const zoomIndicator = document.getElementById('zoom_' + containerId);
                    if (zoomIndicator) {
                        zoomIndicator.textContent = Math.round(newScale * 100) + '%';
                        zoomIndicator.classList.add('visible');
                    }

                    // 显示/隐藏重置按钮
                    const zoomResetBtn = document.getElementById('zoomreset_' + containerId);
                    if (zoomResetBtn) {
                        if (Math.abs(newScale - 1) > 0.01) {
                            zoomResetBtn.classList.add('visible');
                        } else {
                            zoomResetBtn.classList.remove('visible');
                        }
                    }

                    // 重置自动隐藏定时器
                    clearTimeout(viewport._zoomHideTimer);
                    viewport._zoomHideTimer = setTimeout(function() {
                        const zi = document.getElementById('zoom_' + containerId);
                        if (zi) zi.classList.remove('visible');
                    }, 2000);
                }
            });

            viewport.addEventListener('pointerup', function(e) {
                activePointers.delete(e.pointerId);

                if (activePointers.size < 2) {
                    isPinching = false;
                    // 缩放结束后2秒隐藏indicator
                    clearTimeout(viewport._zoomHideTimer);
                    viewport._zoomHideTimer = setTimeout(function() {
                        const zi = document.getElementById('zoom_' + containerId);
                        if (zi) zi.classList.remove('visible');
                    }, 2000);
                }
            });

            viewport.addEventListener('pointercancel', function(e) {
                activePointers.delete(e.pointerId);
                if (activePointers.size < 2) {
                    isPinching = false;
                }
            });
        }

        // ============================================
        // addDraggableImage - 在canvas上添加浮动图片
        // ============================================
        // 收集浮动图片的当前状态，用于保存/刷新后恢复
        function getDraggableImageStates(containerId) {
            const overlay = document.getElementById('overlay_' + containerId);
            if (!overlay) return [];
            const container = document.getElementById(containerId);
            const dpr = (container && container.canvasState && container.canvasState.dpr) || 1;
            const states = [];
            overlay.querySelectorAll('.draggable-image').forEach(function(imgEl) {
                const img = imgEl.querySelector('img');
                if (!img) return;
                const transform = imgEl.style.transform || '';
                const rotateMatch = transform.match(/rotate\(([^)]+)\)/);
                const rotation = rotateMatch ? parseFloat(rotateMatch[1]) : 0;
                states.push({
                    src: img.src,
                    left: parseFloat(imgEl.style.left) || 0,
                    top: parseFloat(imgEl.style.top) || 0,
                    width: parseFloat(imgEl.style.width) || img.naturalWidth,
                    height: parseFloat(imgEl.style.height) || img.naturalHeight,
                    rotation: rotation,
                    imgScale: imgEl._imgScale || 1,
                    dpr: dpr
                });
            });
            return states;
        }

        function addDraggableImage(containerId, dataUrl, savedState) {
            const overlay = document.getElementById('overlay_' + containerId);
            if (!overlay) return;

            const container = document.getElementById(containerId);
            if (!container || !container.canvasState) return;

            const canvas = document.getElementById('canvas_' + containerId);
            if (!canvas) return;

            // 创建浮动图片容器
            const imgWrap = document.createElement('div');
            imgWrap.className = 'draggable-image';
            imgWrap.style.position = 'absolute';

            // 创建图片
            const img = document.createElement('img');
            img.src = dataUrl;
            img.draggable = false;

            // 图片加载后设置初始大小和位置
            img.onload = function() {
                const canvasRect = canvas.getBoundingClientRect();
                const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                let zoomScale = 1;
                if (zoomLayer && zoomLayer._zoomState) {
                    zoomScale = zoomLayer._zoomState.scale;
                }

                const canvasW = canvasRect.width / zoomScale;
                const canvasH = canvasRect.height / zoomScale;
                const ratio = img.naturalHeight / img.naturalWidth;

                let displayW, displayH, startX, startY, rotation = 0, imgScale = 1;

                if (savedState) {
                    // 恢复已保存的位置和大小
                    displayW = savedState.width;
                    displayH = savedState.height;
                    startX = savedState.left;
                    startY = savedState.top;
                    rotation = savedState.rotation || 0;
                    imgScale = savedState.imgScale || 1;
                } else {
                    // 自适应：让整张图完全显示在canvas内
                    const fitW = canvasW * 0.8;
                    const fitH = canvasH * 0.8;
                    displayW = Math.min(img.naturalWidth, fitW);
                    displayH = displayW * ratio;
                    if (displayH > fitH) {
                        displayH = fitH;
                        displayW = displayH / ratio;
                    }
                    // 居中放置
                    startX = (canvasW - displayW) / 2;
                    startY = (canvasH - displayH) / 2;
                }

                imgWrap.style.width = displayW + 'px';
                imgWrap.style.height = displayH + 'px';
                imgWrap.style.left = startX + 'px';
                imgWrap.style.top = startY + 'px';

                imgWrap._imgScale = imgScale;
                imgWrap._initialW = displayW / imgScale;
                imgWrap._initialH = displayH / imgScale;
                imgWrap._rotation = rotation;
                if (rotation !== 0) {
                    imgWrap.style.transform = 'rotate(' + rotation + 'deg)';
                }
            };

            // 初始占位（图片加载前）
            imgWrap.style.left = '50px';
            imgWrap.style.top = '50px';
            imgWrap.style.width = '200px';
            imgWrap.style.height = '150px';
            imgWrap._imgScale = 1;
            imgWrap._rotation = 0;

            imgWrap.appendChild(img);

            // 删除按钮
            const delBtn = document.createElement('button');
            delBtn.className = 'img-delete';
            delBtn.textContent = '×';
            delBtn.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                imgWrap.remove();
                updateBakeBtn(containerId);
            });
            imgWrap.appendChild(delBtn);

            // 裁切按钮
            const cropBtn = document.createElement('button');
            cropBtn.className = 'img-crop-btn';
            cropBtn.textContent = '✂';
            cropBtn.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                enterCropMode(containerId, imgWrap, img);
            });
            imgWrap.appendChild(cropBtn);

            // 旋转连线
            const rotateLine = document.createElement('div');
            rotateLine.className = 'img-rotate-line';
            imgWrap.appendChild(rotateLine);

            // 旋转手柄
            const rotateHandle = document.createElement('div');
            rotateHandle.className = 'img-rotate-handle';
            rotateHandle.textContent = '↻';
            rotateHandle.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startImageRotate(e, imgWrap);
            });
            imgWrap.appendChild(rotateHandle);

            // 缩放手柄（右下角）
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'img-resize-handle';
            resizeHandle.textContent = '⤡';
            resizeHandle.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                const startX = e.clientX;
                const startY = e.clientY;
                const startW = imgWrap.offsetWidth;
                const startH = imgWrap.offsetHeight;
                const aspectRatio = startW / startH;

                function onResizeMove(ev) {
                    ev.preventDefault();
                    const dx = ev.clientX - startX;
                    // 等比缩放：以宽度变化为基准
                    let newW = startW + dx;
                    let newH = newW / aspectRatio;
                    // 最小尺寸限制
                    if (newW < 30) { newW = 30; newH = newW / aspectRatio; }
                    if (newH < 30) { newH = 30; newW = newH * aspectRatio; }

                    imgWrap.style.width = newW + 'px';
                    imgWrap.style.height = newH + 'px';

                    // 更新 _imgScale
                    const initialW = imgWrap._initialW || startW;
                    const initialH = imgWrap._initialH || startH;
                    imgWrap._imgScale = newW / initialW;
                }

                function onResizeEnd(ev) {
                    document.removeEventListener('pointermove', onResizeMove);
                    document.removeEventListener('pointerup', onResizeEnd);
                    document.removeEventListener('pointercancel', onResizeEnd);
                }

                document.addEventListener('pointermove', onResizeMove);
                document.addEventListener('pointerup', onResizeEnd);
                document.addEventListener('pointercancel', onResizeEnd);
            });
            imgWrap.appendChild(resizeHandle);

            // ---- 拖动 + 双指缩放 ----
            let isDragging = false;
            let dragOffsetX = 0, dragOffsetY = 0;
            let imgActivePointers = new Map(); // pointerId -> {x, y}
            let imgInitialPinchDist = 0;
            let imgInitialScale = 1;

            imgWrap.addEventListener('pointerdown', function(e) {
                if (e.target === delBtn || e.target === rotateHandle || e.target === resizeHandle || e.target === cropBtn) return;
                // 裁切模式下禁止拖动
                if (imgWrap._cropBlockDrag) return;

                // 如果图片处于已放置状态，点击重新激活编辑
                if (imgWrap.classList.contains('placed')) {
                    imgWrap.classList.remove('placed');
                    updateBakeBtn(containerId);
                    // 不阻止后续拖动，让用户可以立即操作
                }

                e.stopPropagation();
                e.preventDefault();

                imgActivePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

                if (imgActivePointers.size === 1) {
                    // 单指：拖动
                    isDragging = true;
                    const rect = imgWrap.getBoundingClientRect();
                    dragOffsetX = e.clientX - rect.left;
                    dragOffsetY = e.clientY - rect.top;
                    imgWrap.setPointerCapture(e.pointerId);
                } else if (imgActivePointers.size === 2) {
                    // 双指：缩放图片
                    isDragging = false;
                    const pts = Array.from(imgActivePointers.values());
                    imgInitialPinchDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    imgInitialScale = imgWrap._imgScale || 1;
                }
            });

            imgWrap.addEventListener('pointermove', function(e) {
                if (!imgActivePointers.has(e.pointerId)) return;
                imgActivePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

                if (isDragging && imgActivePointers.size === 1) {
                    // 单指拖动
                    e.preventDefault();
                    const overlayRect = overlay.getBoundingClientRect();
                    let newX = e.clientX - overlayRect.left - dragOffsetX;
                    let newY = e.clientY - overlayRect.top - dragOffsetY;
                    // 获取缩放状态
                    const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                    let zoomScale = 1, panX = 0, panY = 0;
                    if (zoomLayer && zoomLayer._zoomState) {
                        zoomScale = zoomLayer._zoomState.scale;
                        panX = zoomLayer._zoomState.panX;
                        panY = zoomLayer._zoomState.panY;
                    }
                    // 补偿缩放层偏移
                    newX = (newX - panX) / zoomScale;
                    newY = (newY - panY) / zoomScale;

                    imgWrap.style.left = newX + 'px';
                    imgWrap.style.top = newY + 'px';
                } else if (imgActivePointers.size === 2) {
                    // 双指缩放图片
                    e.preventDefault();
                    const pts = Array.from(imgActivePointers.values());
                    const currentDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    const scaleRatio = currentDist / imgInitialPinchDist;
                    let newScale = imgInitialScale * scaleRatio;
                    newScale = Math.max(0.2, Math.min(5, newScale));

                    imgWrap._imgScale = newScale;

                    // 更新图片大小（基于初始适配尺寸）
                    const initialW = imgWrap._initialW || imgWrap.offsetWidth;
                    const initialH = imgWrap._initialH || imgWrap.offsetHeight;
                    const displayW = initialW * newScale;
                    const displayH = initialH * newScale;

                    imgWrap.style.width = displayW + 'px';
                    imgWrap.style.height = displayH + 'px';
                }
            });

            imgWrap.addEventListener('pointerup', function(e) {
                imgActivePointers.delete(e.pointerId);
                if (imgActivePointers.size === 0) {
                    isDragging = false;
                } else if (imgActivePointers.size === 1) {
                    // 从双指变回单指，不启动拖动
                    isDragging = false;
                }
            });

            imgWrap.addEventListener('pointercancel', function(e) {
                imgActivePointers.delete(e.pointerId);
                if (imgActivePointers.size < 2) {
                    isDragging = false;
                }
            });

            overlay.appendChild(imgWrap);
            updateBakeBtn(containerId);
        }

        // ============================================
        // 裁切模式 - enterCropMode / exitCropMode / performCrop
        // ============================================
        function enterCropMode(containerId, imgWrap, img) {
            // 如果已经在裁切模式，不重复进入
            if (imgWrap._cropMode) return;
            imgWrap._cropMode = true;

            // 禁用拖动
            imgWrap._wasDragging = imgWrap.style.cursor;
            imgWrap.style.cursor = 'default';
            imgWrap.style.userSelect = 'none';

            // 隐藏原有工具按钮
            const delBtn = imgWrap.querySelector('.img-delete');
            const cropBtn = imgWrap.querySelector('.img-crop-btn');
            const rotateHandle = imgWrap.querySelector('.img-rotate-handle');
            const rotateLine = imgWrap.querySelector('.img-rotate-line');
            const resizeHandle = imgWrap.querySelector('.img-resize-handle');
            if (delBtn) delBtn.style.display = 'none';
            if (cropBtn) cropBtn.style.display = 'none';
            if (rotateHandle) rotateHandle.style.display = 'none';
            if (rotateLine) rotateLine.style.display = 'none';
            if (resizeHandle) resizeHandle.style.display = 'none';

            // 记录当前内容区域尺寸（排除border，与img显示区域一致）
            const wrapW = imgWrap.clientWidth;
            const wrapH = imgWrap.clientHeight;

            // 裁切区域（初始为全图）
            let cropRect = { left: 0, top: 0, right: wrapW, bottom: wrapH };

            // 创建遮罩容器
            const maskContainer = document.createElement('div');
            maskContainer.className = 'crop-overlay';
            const masks = {};
            ['top','bottom','left','right'].forEach(function(pos) {
                const m = document.createElement('div');
                m.className = 'crop-overlay-mask';
                masks[pos] = m;
                maskContainer.appendChild(m);
            });
            imgWrap.appendChild(maskContainer);

            // 创建8个手柄
            const handles = {};
            const positions = ['top-left','top-right','bottom-left','bottom-right','top-center','bottom-center','left-center','right-center'];
            positions.forEach(function(pos) {
                const h = document.createElement('div');
                h.className = 'crop-handle ' + pos;
                // 清除CSS默认定位，改用JS控制
                h.style.top = '';
                h.style.left = '';
                h.style.right = '';
                h.style.bottom = '';
                h.style.transform = '';
                handles[pos] = h;
                imgWrap.appendChild(h);

                h.addEventListener('pointerdown', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    h.setPointerCapture(e.pointerId);
                    const startX = e.clientX;
                    const startY = e.clientY;
                    const startRect = { left: cropRect.left, top: cropRect.top, right: cropRect.right, bottom: cropRect.bottom };

                    function onMove(ev) {
                        ev.preventDefault();
                        const zoomLayer = document.getElementById('zoomlayer_' + containerId);
                        let zoomScale = 1;
                        if (zoomLayer && zoomLayer._zoomState) zoomScale = zoomLayer._zoomState.scale;

                        const dx = (ev.clientX - startX) / zoomScale;
                        const dy = (ev.clientY - startY) / zoomScale;

                        // 根据手柄位置更新cropRect
                        if (pos === 'top-left' || pos === 'left-center' || pos === 'bottom-left') {
                            cropRect.left = Math.max(0, Math.min(cropRect.right - 20, startRect.left + dx));
                        }
                        if (pos === 'top-right' || pos === 'right-center' || pos === 'bottom-right') {
                            cropRect.right = Math.min(wrapW, Math.max(cropRect.left + 20, startRect.right + dx));
                        }
                        if (pos === 'top-left' || pos === 'top-center' || pos === 'top-right') {
                            cropRect.top = Math.max(0, Math.min(cropRect.bottom - 20, startRect.top + dy));
                        }
                        if (pos === 'bottom-left' || pos === 'bottom-center' || pos === 'bottom-right') {
                            cropRect.bottom = Math.min(wrapH, Math.max(cropRect.top + 20, startRect.bottom + dy));
                        }

                        updateMasks();
                    }

                    function onUp() {
                        h.removeEventListener('pointermove', onMove);
                        h.removeEventListener('pointerup', onUp);
                        h.removeEventListener('pointercancel', onUp);
                    }

                    h.addEventListener('pointermove', onMove);
                    h.addEventListener('pointerup', onUp);
                    h.addEventListener('pointercancel', onUp);
                });
            });

            // 更新遮罩位置
            function updateMasks() {
                const baseHandleStyle = 'position:absolute; width:16px; height:16px; background:#9B59B6; border:2px solid white; border-radius:2px; z-index:12; pointer-events:auto; touch-action:none; right:auto; bottom:auto;';
                // 上方遮罩
                masks.top.style.cssText = 'position:absolute; left:0; top:0; width:' + wrapW + 'px; height:' + cropRect.top + 'px; background:rgba(0,0,0,0.5);';
                // 下方遮罩
                masks.bottom.style.cssText = 'position:absolute; left:0; top:' + cropRect.bottom + 'px; width:' + wrapW + 'px; height:' + (wrapH - cropRect.bottom) + 'px; background:rgba(0,0,0,0.5);';
                // 左方遮罩
                masks.left.style.cssText = 'position:absolute; left:0; top:' + cropRect.top + 'px; width:' + cropRect.left + 'px; height:' + (cropRect.bottom - cropRect.top) + 'px; background:rgba(0,0,0,0.5);';
                // 右方遮罩
                masks.right.style.cssText = 'position:absolute; left:' + cropRect.right + 'px; top:' + cropRect.top + 'px; width:' + (wrapW - cropRect.right) + 'px; height:' + (cropRect.bottom - cropRect.top) + 'px; background:rgba(0,0,0,0.5);';

                // 更新手柄位置（用绝对像素定位，right/bottom设为auto防止CSS类样式冲突）
                handles['top-left'].style.cssText = baseHandleStyle + 'cursor:nwse-resize; top:' + (cropRect.top - 8) + 'px; left:' + (cropRect.left - 8) + 'px;';
                handles['top-right'].style.cssText = baseHandleStyle + 'cursor:nesw-resize; top:' + (cropRect.top - 8) + 'px; left:' + (cropRect.right - 8) + 'px;';
                handles['bottom-left'].style.cssText = baseHandleStyle + 'cursor:nesw-resize; top:' + (cropRect.bottom - 8) + 'px; left:' + (cropRect.left - 8) + 'px;';
                handles['bottom-right'].style.cssText = baseHandleStyle + 'cursor:nwse-resize; top:' + (cropRect.bottom - 8) + 'px; left:' + (cropRect.right - 8) + 'px;';
                handles['top-center'].style.cssText = baseHandleStyle + 'cursor:ns-resize; top:' + (cropRect.top - 8) + 'px; left:' + ((cropRect.left + cropRect.right) / 2 - 8) + 'px;';
                handles['bottom-center'].style.cssText = baseHandleStyle + 'cursor:ns-resize; top:' + (cropRect.bottom - 8) + 'px; left:' + ((cropRect.left + cropRect.right) / 2 - 8) + 'px;';
                handles['left-center'].style.cssText = baseHandleStyle + 'cursor:ew-resize; top:' + ((cropRect.top + cropRect.bottom) / 2 - 8) + 'px; left:' + (cropRect.left - 8) + 'px;';
                handles['right-center'].style.cssText = baseHandleStyle + 'cursor:ew-resize; top:' + ((cropRect.top + cropRect.bottom) / 2 - 8) + 'px; left:' + (cropRect.right - 8) + 'px;';
            }

            // 更新遮罩初始状态
            updateMasks();

            // 确认/取消按钮
            const confirmBar = document.createElement('div');
            confirmBar.className = 'crop-confirm-bar';
            confirmBar.innerHTML = '<button class="crop-confirm-btn">✓ 确认裁切</button><button class="crop-cancel-btn">✕ 取消</button>';
            imgWrap.appendChild(confirmBar);

            confirmBar.querySelector('.crop-cancel-btn').addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                exitCropMode(imgWrap, maskContainer, handles, confirmBar);
            });

            confirmBar.querySelector('.crop-confirm-btn').addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                e.preventDefault();
                performCrop(containerId, imgWrap, img, cropRect, maskContainer, handles, confirmBar);
            });

            // 阻止裁切模式下imgWrap的拖动
            imgWrap._cropBlockDrag = true;
        }

        function exitCropMode(imgWrap, maskContainer, handles, confirmBar) {
            // 移除遮罩
            if (maskContainer && maskContainer.parentNode) maskContainer.parentNode.removeChild(maskContainer);
            // 移除手柄
            Object.keys(handles).forEach(function(key) {
                if (handles[key] && handles[key].parentNode) handles[key].parentNode.removeChild(handles[key]);
            });
            // 移除确认栏
            if (confirmBar && confirmBar.parentNode) confirmBar.parentNode.removeChild(confirmBar);

            // 恢复原有工具按钮
            const delBtn = imgWrap.querySelector('.img-delete');
            const cropBtn = imgWrap.querySelector('.img-crop-btn');
            const rotateHandle = imgWrap.querySelector('.img-rotate-handle');
            const rotateLine = imgWrap.querySelector('.img-rotate-line');
            const resizeHandle = imgWrap.querySelector('.img-resize-handle');
            if (delBtn) delBtn.style.display = '';
            if (cropBtn) cropBtn.style.display = '';
            if (rotateHandle) rotateHandle.style.display = '';
            if (rotateLine) rotateLine.style.display = '';
            if (resizeHandle) resizeHandle.style.display = '';

            // 恢复拖动
            imgWrap.style.cursor = imgWrap._wasDragging || 'move';
            imgWrap._cropMode = false;
            imgWrap._cropBlockDrag = false;
        }

        function performCrop(containerId, imgWrap, img, cropRect, maskContainer, handles, confirmBar) {
            const cropW = cropRect.right - cropRect.left;
            const cropH = cropRect.bottom - cropRect.top;

            // 计算border宽度（box-sizing:border-box下，offsetWidth-clientWidth=边框总宽）
            const borderW = imgWrap.offsetWidth - imgWrap.clientWidth;
            const borderH = imgWrap.offsetHeight - imgWrap.clientHeight;

            // 如果裁切区域等于全图，直接退出
            if (cropW >= imgWrap.clientWidth - 1 && cropH >= imgWrap.clientHeight - 1) {
                exitCropMode(imgWrap, maskContainer, handles, confirmBar);
                return;
            }

            // 使用内容区域尺寸（排除border），与img显示区域精确对应
            const displayW = imgWrap.clientWidth;
            const displayH = imgWrap.clientHeight;
            const naturalW = img.naturalWidth;
            const naturalH = img.naturalHeight;

            // 裁切区域在原图中的对应坐标
            let sx = (cropRect.left / displayW) * naturalW;
            let sy = (cropRect.top / displayH) * naturalH;
            let sw = (cropW / displayW) * naturalW;
            let sh = (cropH / displayH) * naturalH;

            // 钳制源坐标，防止越界
            sx = Math.max(0, Math.min(sx, naturalW - 1));
            sy = Math.max(0, Math.min(sy, naturalH - 1));
            sw = Math.min(sw, naturalW - sx);
            sh = Math.min(sh, naturalH - sy);

            // 创建临时canvas进行裁切
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = Math.max(1, Math.round(sw));
            tempCanvas.height = Math.max(1, Math.round(sh));
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, sx, sy, sw, sh, 0, 0, tempCanvas.width, tempCanvas.height);

            // 获取裁切后的dataURL
            const croppedDataUrl = tempCanvas.toDataURL('image/png');

            // 计算裁切后imgWrap的新位置（保持裁切区域在原位）
            const currentLeft = parseFloat(imgWrap.style.left) || 0;
            const currentTop = parseFloat(imgWrap.style.top) || 0;
            const newLeft = currentLeft + cropRect.left;
            const newTop = currentTop + cropRect.top;

            // 替换图片
            img.onload = function() {
                // 更新imgWrap的位置和大小（加回border宽度，确保内容区域=裁切区域）
                imgWrap.style.left = newLeft + 'px';
                imgWrap.style.top = newTop + 'px';
                imgWrap.style.width = (cropW + borderW) + 'px';
                imgWrap.style.height = (cropH + borderH) + 'px';

                // 重置缩放（_initialW/H使用CSS总宽高，含border）
                imgWrap._imgScale = 1;
                imgWrap._initialW = cropW + borderW;
                imgWrap._initialH = cropH + borderH;

                // 退出裁切模式
                exitCropMode(imgWrap, maskContainer, handles, confirmBar);
            };
            img.src = croppedDataUrl;
        }

        // 旋转手柄交互
        function startImageRotate(e, imgWrap) {
            e.preventDefault();
            const rect = imgWrap.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const startAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const startRotation = imgWrap._rotation || 0;

            function onMove(ev) {
                ev.preventDefault();
                const currentAngle = Math.atan2(ev.clientY - centerY, ev.clientX - centerX);
                let delta = (currentAngle - startAngle) * 180 / Math.PI;
                let newRotation = startRotation + delta;
                imgWrap._rotation = newRotation;
                // 保留已有的缩放transform
                const existingTransform = imgWrap.style.transform || '';
                const scaleMatch = existingTransform.match(/scale\([^)]*\)/);
                const scalePart = scaleMatch ? scaleMatch[0] : '';
                imgWrap.style.transform = (scalePart ? scalePart + ' ' : '') + `rotate(${newRotation}deg)`;
            }

            function onUp(ev) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }
    </script>

    <script>
        // ============================================
        // GitHub 云备份功能
        // ============================================
        function getGithubConfig() {
            return {
                token: localStorage.getItem('ghBackupToken') || '',
                repo: localStorage.getItem('ghBackupRepo') || '',
                branch: localStorage.getItem('ghBackupBranch') || 'main'
            };
        }

        function showGithubSettings() {
            const cfg = getGithubConfig();
            document.getElementById('ghTokenInput').value = cfg.token;
            document.getElementById('ghRepoInput').value = cfg.repo;
            document.getElementById('ghBranchInput').value = cfg.branch;
            document.getElementById('githubSettingsModal').style.display = 'flex';
        }

        function closeGithubSettings() {
            document.getElementById('githubSettingsModal').style.display = 'none';
        }

        function saveGithubSettings() {
            const token = document.getElementById('ghTokenInput').value.trim();
            const repo = document.getElementById('ghRepoInput').value.trim();
            const branch = document.getElementById('ghBranchInput').value.trim() || 'main';
            if (!token || !repo) {
                alert('请填写 Token 和仓库地址');
                return;
            }
            localStorage.setItem('ghBackupToken', token);
            localStorage.setItem('ghBackupRepo', repo);
            localStorage.setItem('ghBackupBranch', branch);
            closeGithubSettings();
            showBackupToast('✅ GitHub 设置已保存', 'success');
        }

        function showBackupToast(msg, type) {
            const toast = document.getElementById('backupToast');
            toast.textContent = msg;
            toast.style.background = type === 'success' ? '#27AE60' : type === 'error' ? '#E74C3C' : '#3498DB';
            toast.style.display = 'block';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 3000);
        }

        async function githubBackup() {
            if (errorData.length === 0) {
                showBackupToast('暂无数据可备份', 'error');
                return;
            }

            const cfg = getGithubConfig();
            if (!cfg.token || !cfg.repo) {
                showGithubSettings();
                return;
            }

            const btn = document.getElementById('githubBackupBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 备份中...';
            showBackupToast('正在备份到 GitHub...', 'info');

            try {
                const dataStr = JSON.stringify(errorData, null, 2);
                const base64Data = btoa(unescape(encodeURIComponent(dataStr)));
                const now = new Date();
                const filePath = 'backups/errorbook_latest.json';
                const apiUrl = 'https://api.github.com/repos/' + cfg.repo + '/contents/' + filePath;

                const headers = {
                    'Authorization': 'token ' + cfg.token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };

                // 获取现有文件的sha（用于覆盖更新）
                let existingSha = null;
                try {
                    const getResp = await fetch(apiUrl + '?ref=' + cfg.branch, {
                        headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (getResp.ok) {
                        const getData = await getResp.json();
                        existingSha = getData.sha;
                    }
                } catch(e) {}

                const body = {
                    message: 'backup: ' + now.toLocaleString('zh-CN'),
                    content: base64Data,
                    branch: cfg.branch
                };
                if (existingSha) body.sha = existingSha;

                const resp = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify(body)
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.message || '上传失败');
                }

                showBackupToast('✅ 备份成功！', 'success');

            } catch (err) {
                console.error('GitHub backup error:', err);
                showBackupToast('❌ 备份失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '☁️ 云备份';
            }
        }

        // 自动备份：每次保存数据时静默备份到GitHub（可选）
        const _origSaveToStorage = saveToStorage;
        saveToStorage = function() {
            _origSaveToStorage();
            // 静默自动备份（仅当已配置且距上次备份>5分钟）
            const cfg = getGithubConfig();
            if (cfg.token && cfg.repo) {
                const lastAuto = parseInt(localStorage.getItem('ghLastAutoBackup') || '0');
                const now = Date.now();
                if (now - lastAuto > 5 * 60 * 1000) {
                    localStorage.setItem('ghLastAutoBackup', now.toString());
                    githubBackupSilent();
                }
            }
        };

        async function githubBackupSilent() {
            try {
                const cfg = getGithubConfig();
                if (!cfg.token || !cfg.repo || errorData.length === 0) return;

                const dataStr = JSON.stringify(errorData, null, 2);
                const base64Data = btoa(unescape(encodeURIComponent(dataStr)));
                const latestPath = 'backups/errorbook_latest.json';
                const latestUrl = 'https://api.github.com/repos/' + cfg.repo + '/contents/' + latestPath;

                const headers = {
                    'Authorization': 'token ' + cfg.token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };

                // 获取现有sha
                let sha = null;
                try {
                    const getResp = await fetch(latestUrl + '?ref=' + cfg.branch, {
                        headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (getResp.ok) {
                        const getData = await getResp.json();
                        sha = getData.sha;
                    }
                } catch(e) {}

                const body = {
                    message: 'auto backup ' + new Date().toLocaleString('zh-CN'),
                    content: base64Data,
                    branch: cfg.branch
                };
                if (sha) body.sha = sha;

                await fetch(latestUrl, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify(body)
                });
                console.log('[AutoBackup] OK');
            } catch(e) {
                console.warn('[AutoBackup] Failed:', e.message);
            }
        }
    </script>
